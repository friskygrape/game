// ── Door System ───────────────────────────────────────────
//
// Each door is a THREE.Group (pivot) placed at the hinge world position.
// The door panel mesh is offset inside the group so its edge sits at the pivot.
// Rotating pivot.rotation.y swings the door open/closed.
//
// THREE.js Y-rotation transforms local coords:
//   x' = x·cos θ + z·sin θ
//   z' = −x·sin θ + z·cos θ
//
// Back-wall doors (face z≈−4.52, hinge at left-x edge):
//   open angle −π/2 → door swings toward +z (camera side)
//
// Left-wall doors (face x≈−4.52, hinge at far-z edge):
//   open angle +π/2 → door swings toward +x (kitchen interior)
//
// Fridge/freezer (face z≈−3.95, hinge at left-x edge x=3.35):
//   open angle −3π/4 → door swings wide into kitchen

const doors      = [];   // { pivot, open, openAngle }
const meshToDoor = new Map();

function makeDoor(gW, gH, gD, hex, px, py, pz, ox, oy, oz, openAngle) {
  const pivot = new THREE.Group();
  pivot.position.set(px, py, pz);
  scene.add(pivot);

  const mesh = new THREE.Mesh(new THREE.BoxGeometry(gW, gH, gD), mat(hex));
  mesh.position.set(ox, oy, oz);
  mesh.castShadow = mesh.receiveShadow = true;
  pivot.add(mesh);

  const door = { pivot, open: false, openAngle };
  meshToDoor.set(mesh, door);
  doors.push(door);
  return door;
}

function addPart(door, gW, gH, gD, hex, lx, ly, lz) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(gW, gH, gD), mat(hex));
  mesh.position.set(lx, ly, lz);
  mesh.castShadow = mesh.receiveShadow = true;
  door.pivot.add(mesh);
  meshToDoor.set(mesh, door);  // clicking any part toggles the door
}

// — Fridge door ————————————————————————————————————————————
// Body center: (4.5, y, -5.0). Front face at z = -5.0 + 1.1 = -3.9.
// Door panel: 2.3 × 3.85 × 0.1, world center (4.5, 2.025, -3.95).
// Hinge at left edge: x = 4.5 − 1.15 = 3.35.
// Pivot at (3.35, 2.025, -3.95); mesh offset (+1.15, 0, 0).
const fridgeDoor = makeDoor(
  2.3, 3.85, 0.1, FRG,
  3.35, 2.025, -3.95,
  1.15, 0, 0,
  -Math.PI * 0.75
);
// Handle: world (3.5, 2.76, -3.88) → local (0.15, 0.735, 0.07)
addPart(fridgeDoor, 0.1, 0.72, 0.12, WHT, 0.15, 0.735, 0.07);

// — Freezer door ———————————————————————————————————————————
// Door panel: 2.3 × 1.55 × 0.1, world center (4.5, 4.725, -3.95).
// Pivot at (3.35, 4.725, -3.95); mesh offset (+1.15, 0, 0).
const freezerDoor = makeDoor(
  2.3, 1.55, 0.1, FRGH,
  3.35, 4.725, -3.95,
  1.15, 0, 0,
  -Math.PI * 0.75
);
// Handle: world (3.5, 4.81, -3.88) → local (0.15, 0.085, 0.07)
addPart(freezerDoor, 0.1, 0.42, 0.12, WHT, 0.15, 0.085, 0.07);
// Divider trim between fridge/freezer: world (4.5, 4.0, -3.92) → local (1.15, -0.725, 0.03)
addPart(freezerDoor, 2.3, 0.1, 0.1, TRIM, 1.15, -0.725, 0.03);

// — Back-wall cabinet doors ————————————————————————————————
// Interior x: −6.10 to −0.10 (6.00 wide). Three equal 2.0-wide doors.
// Hinges flush with cabinet interior left faces: −6.10, −4.10, −2.10.
// Handle at free (right) edge: local x = 1.85, local z = 0.06.
const BW_HINGES = [-6.10, -4.10, -2.10];
BW_HINGES.forEach(hx => {
  const d = makeDoor(
    2.0, 2.6, 0.1, CAB,
    hx, 1.58, -4.52,
    1.0, 0, 0,
    -Math.PI * 0.5
  );
  addPart(d, 0.12, 0.4, 0.1, GY,  1.85, 0.12, 0.06);
});

// — Left-wall cabinet doors ————————————————————————————————
// Interior z: −5.90 to 0.50. Three 2.1-wide doors; hinges at section starts.
// Handle at free (near/+z) edge: local z = 1.95, local x = 0.06.
const LW_HINGES = [-5.90, -3.80, -1.70];
LW_HINGES.forEach(hz => {
  const d = makeDoor(
    0.1, 2.6, 2.1, CAB,
    -4.52, 1.58, hz,
    0, 0, 1.05,
    Math.PI * 0.5
  );
  addPart(d, 0.1, 0.4, 0.12, GY,  0.06, 0.12, 1.95);
});

// ── Interaction ───────────────────────────────────────────

const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();
const allMeshes = [...meshToDoor.keys()];

canvas.addEventListener('click', e => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(allMeshes);
  if (!hits.length) return;
  const door = meshToDoor.get(hits[0].object);
  if (door) door.open = !door.open;
});

canvas.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(allMeshes);
  canvas.style.cursor = hits.length ? 'pointer' : 'default';
});

// ── Render loop ───────────────────────────────────────────

const clock = new THREE.Clock();
const SPEED = 4.0; // radians per second

(function loop() {
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.1);

  for (const d of doors) {
    const target = d.open ? d.openAngle : 0;
    const diff   = target - d.pivot.rotation.y;
    if (Math.abs(diff) > 0.001) {
      d.pivot.rotation.y += diff * Math.min(1, SPEED * dt);
    } else {
      d.pivot.rotation.y = target;
    }
  }

  renderer.render(scene, camera);
})();

// ── Resize ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const a = window.innerWidth / window.innerHeight;
  camera.left = -V * a; camera.right = V * a;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
