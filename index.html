<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Arcade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
'use strict';

// ── Renderer ──────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// ── Scene ─────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

// ── Camera ────────────────────────────────────────────────
const aspect = window.innerWidth / window.innerHeight;
const V = 13;
const camera = new THREE.OrthographicCamera(-V * aspect, V * aspect, V, -V, 0.1, 200);
camera.position.set(22, 22, 22);
camera.lookAt(0, 3, 0);

// ── Lighting ──────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x8080ff, 0.18));

const sun = new THREE.DirectionalLight(0xffffff, 0.7);
sun.position.set(14, 28, 14);
sun.castShadow = true;
sun.shadow.camera.left = sun.shadow.camera.bottom = -22;
sun.shadow.camera.right = sun.shadow.camera.top   =  22;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.bias = -0.001;
scene.add(sun);

// ── Helpers ───────────────────────────────────────────────
const _mc = {};
const mat = hex => _mc[hex] || (_mc[hex] = new THREE.MeshLambertMaterial({ color: hex }));

const _me = {};
function eMat(hex, intensity) {
  const key = `${hex}:${intensity}`;
  return _me[key] || (_me[key] = new THREE.MeshStandardMaterial({
    color: hex, emissive: hex, emissiveIntensity: intensity, roughness: 0.4
  }));
}

function b(w, h, d, hexOrMat, x, y, z) {
  const material = typeof hexOrMat === 'number' ? mat(hexOrMat) : hexOrMat;
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
  m.position.set(x, y + h * 0.5, z);
  m.castShadow = m.receiveShadow = true;
  scene.add(m);
  return m;
}

function nb(w, h, d, hex, intensity, x, y, z) {
  return b(w, h, d, eMat(hex, intensity), x, y, z);
}

// Flat-shaded material (low-poly diorama style)
function lpMat(hex, roughness = 0.65, metalness = 0) {
  return new THREE.MeshStandardMaterial({ color: hex, flatShading: true, roughness, metalness });
}

// Cylinder — y is bottom face
function cyl(rt, rb, h, hexOrMat, x, y, z, segs = 8) {
  const material = typeof hexOrMat === 'number' ? lpMat(hexOrMat) : hexOrMat;
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, segs), material);
  m.position.set(x, y + h * 0.5, z);
  m.castShadow = m.receiveShadow = true;
  scene.add(m);
  return m;
}

// Wedge — like b() but back face (−z) is taller than front face (+z)
// All face windings are outward-facing (verified by cross-product).
function wedge(wx, hFront, hBack, d, mat, x, yBase, z) {
  const hw = wx/2, hd = d/2;
  const v = new Float32Array([
    // bottom  — normal (0,−1,0): CW from above
    -hw,0,+hd,  -hw,0,-hd,  +hw,0,-hd,  +hw,0,+hd,
    // front   — normal (0,0,+1)
    -hw,0,+hd,  +hw,0,+hd,  +hw,hFront,+hd,  -hw,hFront,+hd,
    // back    — normal (0,0,−1)
    +hw,0,-hd,  -hw,0,-hd,  -hw,hBack,-hd,   +hw,hBack,-hd,
    // left    — normal (−1,0,0)
    -hw,0,+hd,  -hw,hFront,+hd,  -hw,hBack,-hd,  -hw,0,-hd,
    // right   — normal (+1,0,0)
    +hw,0,-hd,  +hw,hBack,-hd,   +hw,hFront,+hd,  +hw,0,+hd,
    // top     — normal (0,+1,small+z) : FL FR BL BR
    -hw,hFront,+hd,  +hw,hFront,+hd,  -hw,hBack,-hd,  +hw,hBack,-hd,
  ]);
  const idx = [
    0,1,2, 0,2,3,
    4,5,6, 4,6,7,
    8,9,10, 8,10,11,
    12,13,14, 12,14,15,
    16,17,18, 16,18,19,
    20,21,22, 21,23,22,   // top split: FL-FR-BL, FR-BR-BL
  ];
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(v, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, yBase, z);
  m.castShadow = m.receiveShadow = true;
  scene.add(m);
  return m;
}

// ── Palette ───────────────────────────────────────────────
const WALL  = 0x12122a;
const FLOOR = 0x0e0e20;
const FLRA  = 0x0b0b18;
const TRIM  = 0x1a1a3a;
const CAB   = 0x14142e;
const MTL   = 0x3a3a58;
const DRK   = 0x080818;
const NCN   = 0x00eeff;
const NPN   = 0xff00cc;
const NYL   = 0xffee00;
const NGR   = 0x00ff88;
const ABODY = 0x3d1850;
const ADARK = 0x17082a;
const ASIDE = 0xcc9900;

// ── Room Shell ────────────────────────────────────────────
// Dark carpet base
b(14, 0.10, 14, 0x04040e, 0, -0.1, 0);

// Glow-in-the-dark carpet — brickwork grid edge to edge
const starPalette = [NPN, NCN, NYL, NGR, 0xff2200, 0xcc00ff, 0xff6600];
const ROWS = 11, COLS = 10;
const STEP_X = 1.52, STEP_Z = 1.40;
const START_X = -6.84, START_Z = -6.80;
for (let row = 0; row < ROWS; row++) {
  const offsetX = (row % 2) * STEP_X * 0.5;
  const pz = START_Z + row * STEP_Z;
  for (let col = 0; col < COLS; col++) {
    const px      = START_X + offsetX + col * STEP_X;
    const col_idx = (row * 3 + col) % starPalette.length;
    const sm      = eMat(starPalette[col_idx], 2.2);
    b(0.48, 0.018, 0.10, sm, px, 0.0, pz);
    b(0.10, 0.018, 0.48, sm, px, 0.0, pz);
  }
}

// Left wall
b(0.3, 10, 14, WALL, -7, 0, 0);
// Back wall
b(14, 10, 0.3, WALL,  0, 0, -7);

// Trims
b(0.4, 0.4, 14.3, TRIM, -7, 10, 0);
b(14.3, 0.4, 0.4, TRIM,  0, 10, -7);
b(0.4, 10,  0.4,  TRIM, -7,  0, -7);
b(0.2, 0.2, 14,   TRIM, -7,  0, 0);
b(14,  0.2, 0.2,  TRIM,  0,  0, -7);

// ── Neon Wall Strips ──────────────────────────────────────
// Cyan on the left wall
const cyanStrip = nb(0.10, 0.18, 13.4, NCN, 9.0, -6.84, 9.5, 0);
const cyanStripLight1 = new THREE.PointLight(NCN, 3.0, 18);
cyanStripLight1.position.set(-6.0, 9.0, -3.5);
scene.add(cyanStripLight1);
const cyanStripLight2 = new THREE.PointLight(NCN, 3.0, 18);
cyanStripLight2.position.set(-6.0, 9.0,  3.5);
scene.add(cyanStripLight2);

// Pink on the back wall
const pinkStrip = nb(13.4, 0.18, 0.10, NPN, 9.0, 0, 9.5, -6.84);
const pinkStripLight1 = new THREE.PointLight(NPN, 3.0, 18);
pinkStripLight1.position.set(-3.5, 9.0, -6.0);
scene.add(pinkStripLight1);
const pinkStripLight2 = new THREE.PointLight(NPN, 3.0, 18);
pinkStripLight2.position.set( 3.5, 9.0, -6.0);
scene.add(pinkStripLight2);

// Strips start off — power switch controls them
cyanStrip.material.emissiveIntensity = 0;
cyanStripLight1.intensity = 0; cyanStripLight2.intensity = 0;
pinkStrip.material.emissiveIntensity = 0;
pinkStripLight1.intensity = 0; pinkStripLight2.intensity = 0;

// ── Arcade Cabinets ───────────────────────────────────────
const AZ = -6.05;

function makeArcade(ax, az, sideCol = ASIDE, type = 'space') {
  // Cabinet shell — flat top, curved sides (classic waist silhouette).
  const CW = 1.04, CD = 1.60, BODY_H = 4.20, CW_W = 0.90;
  const shape = new THREE.Shape();
  shape.moveTo(-CW, 0);
  shape.lineTo( CW, 0);
  shape.quadraticCurveTo( CW_W, BODY_H * 0.5,  CW, BODY_H);
  shape.lineTo(-CW, BODY_H);
  shape.quadraticCurveTo(-CW_W, BODY_H * 0.5, -CW, 0);
  shape.closePath();
  const shellGeo = new THREE.ExtrudeGeometry(shape, { depth: CD, bevelEnabled: false, curveSegments: 6 });
  shellGeo.translate(0, 0, -CD / 2);
  const shellMesh = new THREE.Mesh(shellGeo, [lpMat(ABODY, 0.8), lpMat(sideCol, 0.7)]);
  shellMesh.position.set(ax, 0.28, az);
  shellMesh.castShadow = true;
  scene.add(shellMesh);

  // Base plinth
  b(2.22, 0.28, 1.74, ADARK, ax, 0.00, az);

  // Coin door
  b(1.00, 0.86, 0.08, ADARK, ax, 0.44, az + 0.76);
  b(0.30, 0.10, 0.10, 0x888898, ax - 0.22, 0.86, az + 0.80);
  b(0.30, 0.10, 0.10, 0x888898, ax + 0.22, 0.86, az + 0.80);
  b(0.60, 0.08, 0.08, 0x444466, ax, 1.18, az + 0.80);

  // Control panel deck + front lip (protrudes past cabinet front)
  b(2.00, 0.28, 1.70, 0x22103a, ax, 2.28, az + 0.65);
  b(2.00, 0.50, 0.12, ADARK,    ax, 2.05, az + 1.45);

  // Control refs — populated per type, returned for render-loop animation
  const ctrl = {};
  if (type === 'space') {
    // Space Blasters: joystick (left) + 1 oversized fire button (right)
    b(0.36, 0.16, 0.36, 0x282830, ax - 0.38, 2.56, az + 1.10);
    ctrl.js   = b(0.10, 0.38, 0.10, 0x111118, ax - 0.38, 2.72, az + 1.10);
    cyl(0.09, 0.09, 0.10, 0x222233, ax - 0.38, 3.10, az + 1.10, 8);
    ctrl.fire = b(0.38, 0.15, 0.38, 0xff1133, ax + 0.38, 2.57, az + 1.10);
    ctrl.fireBaseY = ctrl.fire.position.y;
  } else if (type === 'fight') {
    // Street Kombat: joystick + 4 attack buttons (2×2 arcade layout)
    b(0.36, 0.16, 0.36, 0x282830, ax - 0.46, 2.56, az + 1.10);
    ctrl.js   = b(0.10, 0.38, 0.10, 0x111118, ax - 0.46, 2.72, az + 1.10);
    cyl(0.09, 0.09, 0.10, 0x222233, ax - 0.46, 3.10, az + 1.10, 8);
    ctrl.btns = [
      b(0.22, 0.12, 0.22, 0xff1133, ax + 0.14, 2.57, az + 0.93),
      b(0.22, 0.12, 0.22, NCN,      ax + 0.44, 2.57, az + 0.93),
      b(0.22, 0.12, 0.22, NYL,      ax + 0.14, 2.57, az + 1.22),
      b(0.22, 0.12, 0.22, NGR,      ax + 0.44, 2.57, az + 1.22),
    ];
    ctrl.btnsBaseY = ctrl.btns.map(m => m.position.y);
  } else {
    // Turbo Drift: steering wheel + gas (green) / brake (red)
    ctrl.whl = new THREE.Mesh(new THREE.TorusGeometry(0.22, 0.045, 6, 12), lpMat(0x1a1a2a, 0.5));
    ctrl.whl.rotation.x = Math.PI / 2.8;
    ctrl.whl.position.set(ax - 0.16, 2.82, az + 1.18);
    ctrl.whl.castShadow = true; scene.add(ctrl.whl);
    cyl(0.055, 0.055, 0.06, 0x333344, ax - 0.16, 2.82, az + 1.18, 6);
    b(0.07, 0.30, 0.07, 0x333344, ax - 0.16, 2.52, az + 1.18);
    ctrl.gas      = b(0.26, 0.14, 0.26, NGR,      ax + 0.46, 2.57, az + 1.18);
    ctrl.gasBaseY = ctrl.gas.position.y;
    b(0.26, 0.14, 0.26, 0xff2200, ax + 0.46, 2.57, az + 0.86);
  }

  // Screen bezel + canvas-animated screen
  b(1.74, 1.30, 0.10, ADARK, ax, 2.56, az + 0.76);
  const screenCv  = document.createElement('canvas');
  screenCv.width  = 256;
  screenCv.height = 192;
  const screenTex = new THREE.CanvasTexture(screenCv);
  const screenCtx = screenCv.getContext('2d');
  const screenMat = new THREE.MeshStandardMaterial({
    color: 0x000000, map: screenTex,
    emissiveMap: screenTex, emissive: new THREE.Color(1, 1, 1),
    emissiveIntensity: 0, roughness: 0.25,
  });
  const screen = b(1.44, 1.06, 0.12, screenMat, ax, 2.70, az + 0.79);

  // Speaker grilles
  b(0.44, 0.22, 0.08, ADARK, ax - 0.70, 4.10, az + 0.77);
  b(0.44, 0.22, 0.08, ADARK, ax + 0.70, 4.10, az + 0.77);

  // Marquee sign + neon border at top — per-machine materials so each toggles independently
  b(1.76, 0.54, 0.08, 0x020208, ax, 4.25, az + 0.77);
  const _borderMat = new THREE.MeshStandardMaterial({ color: NCN, emissive: NCN, emissiveIntensity: 0, roughness: 0.4 });
  b(2.06, 0.06, 0.06, _borderMat, ax, 4.20, az + 0.80);
  b(2.06, 0.06, 0.06, _borderMat, ax, 4.76, az + 0.80);
  b(0.06, 0.56, 0.06, _borderMat, ax - 1.03, 4.20, az + 0.80);
  b(0.06, 0.56, 0.06, _borderMat, ax + 1.03, 4.20, az + 0.80);

  // Edge neon strips
  const _edgeMat = new THREE.MeshStandardMaterial({ color: NPN, emissive: NPN, emissiveIntensity: 0, roughness: 0.4 });
  b(0.08, 4.48, 0.08, _edgeMat, ax - 1.04, 0.00, az + 0.82);
  b(0.08, 4.48, 0.08, _edgeMat, ax + 1.04, 0.00, az + 0.82);

  const neons = [
    { mat: _borderMat, onInt: 2.8 },
    { mat: _edgeMat,   onInt: 3.2 },
  ];

  const light = new THREE.PointLight(NCN, 0.9, 14);
  light.position.set(ax, 3.40, az + 2.00);
  scene.add(light);

  return { screen, screenMat, light, screenCtx, screenTex, ctrl, neons };
}

const cab1 = makeArcade(-5.0, AZ, 0x080820, 'space');  // Space Blasters
const cab2 = makeArcade(-2.5, AZ, 0x1a0606, 'fight');  // Street Kombat
const cab3 = makeArcade( 0.0, AZ, 0x051408, 'race');   // Turbo Drift

// ── Cabinet Side Art ──────────────────────────────────────
// Applies a canvas texture to the right-facing side of each cabinet.
// After rotation.y = +PI/2: canvas X → world +Z, canvas Y → world +Y.
// Normal faces +X (toward camera at x=+22).
function applySideArt(ax, drawFn) {
  const W = 256, H = 768;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  drawFn(cv.getContext('2d'), W, H);
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(1.52, 4.44),
    new THREE.MeshStandardMaterial({
      map: new THREE.CanvasTexture(cv),
      emissiveMap: new THREE.CanvasTexture(cv),
      emissive: new THREE.Color(1, 1, 1), emissiveIntensity: 0.55,
      roughness: 0.5,
    })
  );
  m.rotation.y = Math.PI / 2;
  m.position.set(ax + 1.06, 2.50, AZ);
  scene.add(m);
}

// Neon marquee name sign — canvas text with multi-pass glow, sits on cabinet front
function applyMarquee(ax, name, hexColor) {
  const W = 512, H = 128;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  const css = `#${hexColor.toString(16).padStart(6, '0')}`;

  ctx.fillStyle = '#000008';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 52px monospace';

  // Wide outer glow
  ctx.shadowColor = css; ctx.shadowBlur = 32;
  ctx.fillStyle = css; ctx.fillText(name, W / 2, H / 2);
  // Tighter mid glow
  ctx.shadowBlur = 14; ctx.fillText(name, W / 2, H / 2);
  // Bright white core
  ctx.shadowBlur = 6; ctx.fillStyle = '#ffffff'; ctx.fillText(name, W / 2, H / 2);

  const tex = new THREE.CanvasTexture(cv);
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(1.74, 0.52),
    new THREE.MeshStandardMaterial({
      map: tex, emissiveMap: tex,
      emissive: new THREE.Color(1, 1, 1), emissiveIntensity: 0,
      roughness: 0.3, transparent: true,
    })
  );
  m.position.set(ax, 4.52, AZ + 0.82);
  scene.add(m);
  return m.material;
}

// ── SPACE BLASTERS ───────────────────────────────────────
applySideArt(-5.0, (ctx, W, H) => {
  ctx.fillStyle = '#02031a'; ctx.fillRect(0, 0, W, H);

  // Star field
  for (let i = 0; i < 50; i++) {
    const sx = ((i * 97) + 13) % W, sy = ((i * 149) + 7) % H;
    const r = i % 8 === 0 ? 2.5 : 1;
    const c = ['#ffffff','#00eeff','#ffee00','#ff88ff'][i % 4];
    ctx.fillStyle = c; ctx.shadowColor = c; ctx.shadowBlur = r > 1 ? 8 : 3;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Planet with ring
  const pg = ctx.createRadialGradient(W/2, H*0.24, 8, W/2, H*0.24, 52);
  pg.addColorStop(0, '#ff9900'); pg.addColorStop(0.7, '#cc4400'); pg.addColorStop(1, '#110000');
  ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(W/2, H*0.24, 50, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 4; ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 14;
  ctx.beginPath(); ctx.ellipse(W/2, H*0.24, 70, 14, 0, 0, Math.PI*2); ctx.stroke();
  ctx.shadowBlur = 0;

  // Spaceship body
  ctx.fillStyle = '#00eeff'; ctx.shadowColor = '#00eeff'; ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.moveTo(W/2, H*0.46); ctx.lineTo(W/2-30, H*0.59);
  ctx.lineTo(W/2-10, H*0.55); ctx.lineTo(W/2-10, H*0.66);
  ctx.lineTo(W/2+10, H*0.66); ctx.lineTo(W/2+10, H*0.55);
  ctx.lineTo(W/2+30, H*0.59); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ff6600'; ctx.shadowColor = '#ff6600';
  ctx.beginPath(); ctx.arc(W/2, H*0.665, 7, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Laser streaks
  [[W*0.08,W*0.44,'#00eeff'],[W*0.52,W*0.94,'#ff00cc'],[W*0.04,W*0.38,'#00eeff']].forEach(([x1,x2,col],i) => {
    ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.shadowColor = col; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.moveTo(x1, H*0.74+i*14); ctx.lineTo(x2, H*0.74+i*14); ctx.stroke();
    ctx.shadowBlur = 0;
  });

  ctx.textAlign = 'center';
  ctx.font = 'bold 26px "Courier New"';
  ctx.fillStyle = '#ffee00'; ctx.shadowColor = '#ffee00'; ctx.shadowBlur = 16; ctx.fillText('SPACE', W/2, H*0.87);
  ctx.fillStyle = '#ff00cc'; ctx.shadowColor = '#ff00cc'; ctx.fillText('BLASTERS', W/2, H*0.94);
  ctx.shadowBlur = 0;
});

// ── STREET KOMBAT ────────────────────────────────────────
applySideArt(-2.5, (ctx, W, H) => {
  ctx.fillStyle = '#0e0000'; ctx.fillRect(0, 0, W, H);

  const fg = ctx.createLinearGradient(0, H*0.60, 0, H);
  fg.addColorStop(0, 'rgba(180,20,0,0)'); fg.addColorStop(1, 'rgba(255,90,0,0.5)');
  ctx.fillStyle = fg; ctx.fillRect(0, H*0.60, W, H*0.40);

  // Lightning bolt
  ctx.strokeStyle = '#ffee00'; ctx.lineWidth = 6; ctx.lineJoin = 'round';
  ctx.shadowColor = '#ffee00'; ctx.shadowBlur = 22;
  ctx.beginPath();
  ctx.moveTo(W*0.60, H*0.06); ctx.lineTo(W*0.40, H*0.30);
  ctx.lineTo(W*0.54, H*0.30); ctx.lineTo(W*0.36, H*0.55); ctx.stroke();
  ctx.shadowBlur = 0;

  // Fighter silhouette
  ctx.fillStyle = '#cc0000'; ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.arc(W/2, H*0.25, 15, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(W/2-13, H*0.30, 26, 40);
  ctx.save(); ctx.translate(W/2+14, H*0.39); ctx.rotate(-0.85);
    ctx.fillRect(0, -7, 44, 14); ctx.restore();
  ctx.fillRect(W/2-10, H*0.48, 10, 36);
  ctx.save(); ctx.translate(W/2+2, H*0.51); ctx.rotate(0.70);
    ctx.fillRect(0, -7, 42, 14); ctx.restore();
  ctx.shadowBlur = 0;

  [[H*0.63,'#ff2200'],[H*0.67,'#cc0000'],[H*0.71,'#ff4400']].forEach(([y, col]) => {
    ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.shadowColor = col; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.moveTo(20, y); ctx.lineTo(W-20, y); ctx.stroke(); ctx.shadowBlur = 0;
  });

  ctx.textAlign = 'center';
  ctx.font = 'bold 28px "Courier New"';
  ctx.fillStyle = '#ff5500'; ctx.shadowColor = '#ff3300'; ctx.shadowBlur = 16; ctx.fillText('STREET', W/2, H*0.86);
  ctx.fillStyle = '#ffee00'; ctx.shadowColor = '#ffcc00'; ctx.fillText('KOMBAT', W/2, H*0.93);
  ctx.shadowBlur = 0;
});

// ── TURBO DRIFT ──────────────────────────────────────────
applySideArt(0.0, (ctx, W, H) => {
  ctx.fillStyle = '#000e04'; ctx.fillRect(0, 0, W, H);

  // Checkered band at top
  const cw = W/8, ch = H*0.14/4;
  for (let r = 0; r < 4; r++) for (let c = 0; c < 8; c++) {
    ctx.fillStyle = (r+c)%2===0 ? 'rgba(255,255,255,0.92)' : 'rgba(0,0,0,0.85)';
    ctx.fillRect(c*cw, r*ch, cw, ch);
  }

  // Speed lines
  for (let i = 0; i < 7; i++) {
    const y = H*0.27+i*H*0.048, len = 30+(i%3)*55;

    ctx.lineWidth = i%3===0 ? 3 : 1.5; ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 7;
    ctx.beginPath(); ctx.moveTo(W*0.52, y); ctx.lineTo(W*0.52-len, y); ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Car body + cabin
  ctx.fillStyle = '#00ff88'; ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 18;
  ctx.fillRect(W*0.10, H*0.51, W*0.80, H*0.09);
  ctx.fillRect(W*0.24, H*0.44, W*0.50, H*0.08);

    ctx.fillStyle = '#001a0a'; ctx.fill();
    ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 3; ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 10;
    ctx.stroke(); ctx.shadowBlur = 0;
  });

  // Dashed road lines
  [H*0.73, H*0.77, H*0.81].forEach(y => {
    ctx.strokeStyle = '#ffee00'; ctx.lineWidth = 2; ctx.shadowColor = '#ffee00'; ctx.shadowBlur = 8;
    ctx.setLineDash([20, 14]);
    ctx.beginPath(); ctx.moveTo(20, y); ctx.lineTo(W-20, y); ctx.stroke();
    ctx.setLineDash([]); ctx.shadowBlur = 0;
  });

  ctx.textAlign = 'center';
  ctx.font = 'bold 28px "Courier New"';
  ctx.fillStyle = '#ffee00'; ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 16; ctx.fillText('TURBO', W/2, H*0.88);
  ctx.fillStyle = '#00ff88'; ctx.shadowColor = '#00cc66'; ctx.fillText('DRIFT', W/2, H*0.95);
  ctx.shadowBlur = 0;
});

// flickerHz: oscillation speed; flickerDur: ms until settled
// Proxy light objects let the flicker system drive both point lights from one handle
const _cyanLightProxy = { get intensity() { return cyanStripLight1.intensity; }, set intensity(v) { cyanStripLight1.intensity = cyanStripLight2.intensity = v; } };
const _pinkLightProxy  = { get intensity() { return pinkStripLight1.intensity;  }, set intensity(v) { pinkStripLight1.intensity  = pinkStripLight2.intensity  = v; } };

  [cab1.screen, { mat: cab1.screenMat, light: cab1.light, on: false,
                  onInt: 1.8, offInt: 0, onLit: 1.6, offLit: 0.25,

  [pinballBack, { mat: pinballBackMat, light: pinballLight, on: false,

                  flickerStart: null, flickerDur: 1900, flickerHz: 7  }],
  [cyanStrip,   { mat: cyanStrip.material, light: _cyanLightProxy, on: false,
                  onInt: 3.0, offInt: 0, onLit: 0.5, offLit: 0,
                  flickerStart: null, flickerDur: 1300, flickerHz: 9,  isStrip: true }],
  [pinkStrip,   { mat: pinkStrip.material, light: _pinkLightProxy,  on: false,
                  onInt: 7.5, offInt: 0, onLit: 2.0, offLit: 0,
                  flickerStart: null, flickerDur: 850,  flickerHz: 17, isStrip: true }],
]);

const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();
const hitMeshes = [...clickables.keys()];

function turnOn(item) {
  item.on = true;
  item.flickerStart = performance.now();
  item.light.intensity = item.onLit;
  if (item.neons) for (const n of item.neons) n.mat.emissiveIntensity = n.onInt;
}

function turnOff(item) {
  item.on = false;
  item.flickerStart = null;
  item.mat.emissiveIntensity = item.offInt;
  item.light.intensity = item.offLit;
  if (item.neons) for (const n of item.neons) n.mat.emissiveIntensity = 0;
}

canvas.addEventListener('click', e => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Power switch — flicks all machines together
  if (raycaster.intersectObject(switchHitArea).length) {
    powerOn = !powerOn;
    powerSwitch.position.y = powerOn ? LEVER_ON_Y : LEVER_OFF_Y;
    const ledColor = powerOn ? 0x00ff44 : 0x00eeff;
    switchLedMat.color.set(ledColor);
    switchLedMat.emissive.set(ledColor);
    if (powerOn) {
      switchLedMat.emissiveIntensity = 2.5;
      switchGlowLight.color.set(0x00ff44);
      switchGlowLight.intensity = 0;
    } else {
      switchGlowLight.color.set(0x00eeff);
    }
    for (const item of clickables.values()) {
      powerOn ? turnOn(item) : turnOff(item);
    }
    lbMesh.visible = powerOn;
    return;
  }

  // Individual machine toggle
  const hit = raycaster.intersectObjects(hitMeshes)[0];
  if (!hit) return;
  const item = clickables.get(hit.object);
  item.on ? turnOff(item) : turnOn(item);
  if (hit.object === pinballBack) lbMesh.visible = item.on;
});

canvas.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const pointer = raycaster.intersectObjects([...hitMeshes, switchHitArea]).length > 0;
  canvas.style.cursor = pointer ? 'pointer' : 'default';
});

  const img = ctx.createImageData(W, H);

    const v = Math.random() * 180 | 0;
    d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
}

  ctx.fillStyle = '#000010'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 28; i++) ctx.fillRect((i*47+13)%W, (i*61+7)%H, 1+(i%2), 1+(i%2));
  // Aliens (3 rows × 8 cols, two-frame leg animation)
  const ph = Math.floor(t * 2.5) % 2;
  const ROWS_COL = ['#ff44aa','#ff8844','#44ddff'];
  for (let row = 0; row < 3; row++) {
    ctx.fillStyle = ROWS_COL[row];
    for (let col = 0; col < 8; col++) {
      const ax2 = _sb.alienOffX + col * 26, ay = _sb.alienY + row * 20;
      ctx.fillRect(ax2+4, ay,   8,  3);
      ctx.fillRect(ax2+2, ay+3, 12, 6);
      ctx.fillRect(ax2+4, ay+9, 8,  2);
      ctx.fillRect(ax2+(ph?1:2), ay+11, 3, 3);
      ctx.fillRect(ax2+(ph?10:11), ay+11, 3, 3);
    }
  }
  _sb.alienOffX += _sb.dir * 38 * dt;
  if (_sb.alienOffX > W - 218 || _sb.alienOffX < 4) { _sb.dir *= -1; _sb.alienY += 4; if (_sb.alienY > H - 60) _sb.alienY = 20; }
  // Player ship
  const px = W * 0.5, py = H - 16;
  ctx.fillStyle = '#88ffff';
  ctx.fillRect(px-2, py-5, 4, 5); ctx.fillRect(px-9, py, 18, 6); ctx.fillRect(px-13, py+3, 26, 2);
  ctx.fillStyle = '#ff5500'; ctx.fillRect(px-4, py+8, 8, 2 + (Math.sin(t*18)*1.5|0));
  // Bullet
  _sb.cooldown -= dt;
  if (_sb.bulletY < 0 && _sb.cooldown <= 0) { _sb.bulletY = py - 5; _sb.cooldown = 1.0; }
  if (_sb.bulletY >= 0) {
    _sb.bulletY -= 95 * dt;
    ctx.fillStyle = '#ffff00'; ctx.fillRect(px - 1, _sb.bulletY, 2, 9);
    if (_sb.bulletY < 0) { _sb.bulletY = -1; _sb.score += 50; }
  }
  ctx.fillStyle = '#00ff88'; ctx.font = 'bold 9px monospace';
  ctx.fillText(`SCORE  ${_sb.score}`, 4, 13);
}

// Street Kombat — fighting game
const _sk = { p1h: 0.72, p2h: 0.45, p1a: 0, p2a: 0, acd: 0, ft: 0 };
function _fighter(ctx, x, gy, dir, bob, action) {
  const f = dir; // +1 or -1 for facing direction
  const cs = dir > 0 ? '#4466ff' : '#ff3322';
  const fs = dir > 0 ? '#99aaff' : '#ff9988';
  const fy = gy + bob;
  ctx.fillStyle = cs;
  ctx.fillRect(x - 12, fy - 52, 24, 24);                              // torso
  ctx.fillRect(x - 8,  fy - 68, 16, 16);                              // head
  ctx.fillStyle = fs; ctx.fillRect(x - 5, fy - 65, 10, 7);            // face
  ctx.fillStyle = cs;
  ctx.fillRect(x - 7,  fy - 28, 8, 22); ctx.fillRect(x - 1, fy - 28, 8, 22); // legs
  ctx.fillRect(x - 10*f - 6, fy - 8, 12, 8); ctx.fillRect(x + 1*f - 3, fy - 8, 12, 8); // feet
  if (action === 1) { // punch
    ctx.fillRect(x + 10*f, fy - 50, 22*f, 7); ctx.fillRect(x - 20*f, fy - 48, 10*f, 7);
  } else if (action === 2) { // kick
    ctx.fillRect(x - 8, fy - 30, 8, 22); ctx.fillRect(x + 4*f, fy - 26, 22*f, 7);
  } else { // idle
    ctx.fillRect(x + 12*f, fy - 52, 8*f, 18); ctx.fillRect(x - 20*f, fy - 52, 8*f, 18);
  }
}
function drawFightGame(ctx, W, H, t) {
  const dt = Math.min(t - _sk.ft, 0.1); _sk.ft = t;
  // Background
  ctx.fillStyle = '#0c0210'; ctx.fillRect(0, 0, W, H);
  const gy = ctx.createLinearGradient(0, H*0.28, 0, H*0.68);
  gy.addColorStop(0, '#1a0320'); gy.addColorStop(1, '#2e0530');
  ctx.fillStyle = gy; ctx.fillRect(0, H*0.28, W, H*0.4);
  ctx.fillStyle = '#080010'; ctx.fillRect(0, H*0.68, W, H*0.32);
  ctx.fillStyle = '#cc0033'; ctx.fillRect(0, H*0.68-1, W, 2);
  // Crowd silhouettes
  ctx.fillStyle = '#18002a';
  for (let i = 0; i < 18; i++) {
    const cx = i*14+7, cy = H*0.28 + (i%3)*5 + 8;
    ctx.beginPath(); ctx.arc(cx, cy, 5.5, Math.PI, 0); ctx.fill();
    ctx.fillRect(cx-5, cy, 10, 12);
  }
  // Health bars
  const floorY = H * 0.68;
  ctx.fillStyle = '#440000'; ctx.fillRect(4, 4, 90, 10);
  ctx.fillStyle = '#ee2200'; ctx.fillRect(4, 4, 90 * _sk.p1h, 10);
  ctx.fillStyle = '#440000'; ctx.fillRect(W-94, 4, 90, 10);
  const pw = 90 * _sk.p2h; ctx.fillStyle = '#ee2200'; ctx.fillRect(W-4-pw, 4, pw, 10);
  ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('34', W/2, 14); ctx.textAlign = 'left';
  const bob = Math.sin(t * 4) * 2.5;
  _fighter(ctx, W*0.28, floorY,  1,  bob, _sk.p1a);
  _fighter(ctx, W*0.72, floorY, -1, -bob, _sk.p2a);
  _sk.acd -= dt;
  if (_sk.acd <= 0) { _sk.p1a = Math.random()>0.45?1:0; _sk.p2a = Math.random()>0.55?2:0; _sk.acd = 0.5+Math.random()*0.9; }
}

// Turbo Drift — racing game
const _td = { ro: 0, speed: 178, ft: 0, trees: Array.from({length:6},(_,i)=>({s:i<3?-1:1,p:i*0.17})) };
function drawRaceGame(ctx, W, H, t) {
  const dt = Math.min(t - _td.ft, 0.1); _td.ft = t;
  _td.ro = (_td.ro + dt * 0.65) % 1;
  const sky = ctx.createLinearGradient(0, 0, 0, H*0.46);
  sky.addColorStop(0,'#000820'); sky.addColorStop(1,'#051838');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H*0.46);
  // Mountains
  ctx.fillStyle = '#090e1e'; ctx.beginPath(); ctx.moveTo(0, H*0.46);
  for (let i = 0; i <= 9; i++) ctx.lineTo(i*W/9, H*0.46 - (((i*7+3)%5)*11+8));
  ctx.lineTo(W, H*0.46); ctx.closePath(); ctx.fill();
  // Grass
  ctx.fillStyle = '#04100a'; ctx.fillRect(0, H*0.46, W, H*0.54);
  // Road trapezoid
  ctx.fillStyle = '#181820'; ctx.beginPath();
  ctx.moveTo(W*0.18, H); ctx.lineTo(W*0.82, H); ctx.lineTo(W/2+3, H*0.46); ctx.lineTo(W/2-3, H*0.46);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#bbbb33'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W*0.18,H); ctx.lineTo(W/2-3,H*0.46); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.82,H); ctx.lineTo(W/2+3,H*0.46); ctx.stroke();
  // Center dashes
  for (let i = 0; i < 9; i++) {
    const p = ((i/9) + _td.ro) % 1;
    const y = H*0.46 + (H - H*0.46)*p;
    const hw = 0.5 + p*2.5;
    ctx.fillStyle = '#ffff44'; ctx.fillRect(W/2-hw, y, hw*2, Math.max(2, p*8));
  }
  // Trees
  for (const tr of _td.trees) {
    tr.p = (tr.p + dt * 0.38) % 1;
    const p = tr.p, tx = tr.s < 0 ? W*0.06+p*(W*0.15) : W*0.94-p*(W*0.15);
    const y = H*0.46 + (H-H*0.46)*p*0.88, tw = 2+p*9, th = 4+p*18;
    ctx.fillStyle = '#091c09'; ctx.fillRect(tx-tw*0.3, y-th, tw*0.6, th);
    ctx.fillStyle = '#0d380d'; ctx.beginPath(); ctx.arc(tx, y-th, tw, 0, Math.PI*2); ctx.fill();
  }
  // Car
  const cx = W/2, cy = H-22;
  ctx.fillStyle = '#ff3300'; ctx.fillRect(cx-12, cy-14, 24, 20);
  ctx.fillStyle = '#88ccff'; ctx.fillRect(cx-9, cy-12, 18, 10);
  ctx.fillStyle = '#111'; ctx.fillRect(cx-15, cy-5, 6, 11); ctx.fillRect(cx+9, cy-5, 6, 11);
  ctx.fillStyle = '#ffff00'; ctx.fillRect(cx-13, cy-10, 4, 4); ctx.fillRect(cx+9, cy-10, 4, 4);
  // HUD
  ctx.fillStyle = '#00ff88'; ctx.font = 'bold 8px monospace';
  ctx.fillText(`${_td.speed} MPH`, 4, 12);
  ctx.textAlign = 'right'; ctx.fillText('LAP 2/3', W-4, 12); ctx.textAlign = 'left';
}

// ── Render Loop ───────────────────────────────────────────
let lastAmbientTick = performance.now();
let ambientItem      = null;
let ambientStart     = null;
let ambientRRIndex   = 0;
const AMBIENT_EVERY  = 7000;
const AMBIENT_DUR    = 450;

(function loop() {
  requestAnimationFrame(loop);

  const now = performance.now();
  // Power switch LED pulse — breathes when off to attract attention
  if (!powerOn) {
    const pulse = 0.5 + 0.5 * Math.sin(now * 0.004);
    switchLedMat.emissiveIntensity = 1.2 + pulse * 2.2;
    switchGlowLight.intensity      = 0.6 + pulse * 2.0;
  }

  for (const item of clickables.values()) {
    if (item.flickerStart === null) continue;
    const elapsed = now - item.flickerStart;
    if (elapsed >= item.flickerDur) {
      item.mat.emissiveIntensity = item.onInt;
      item.light.intensity = item.onLit;
      item.flickerStart = null;
    } else {
      // Chaos falls from 1→0 as the screen stabilises
      const t = elapsed / item.flickerDur;
      const chaos = Math.pow(1 - t, 0.7);
      // Two overlapping sine waves at coprime multiples for irregular beats
      const hz = item.flickerHz * 0.001;
      const osc = Math.sin(now * hz) * Math.sin(now * hz * 2.618 + 1.4);
      // When chaos is high and osc is negative the screen dips dark
      const dip = chaos * Math.max(0, -osc);
      item.mat.emissiveIntensity = item.onInt * Math.max(0.02, 1 - dip);
      item.light.intensity = item.onLit * Math.max(0.1, 1 - dip * 0.6);
    }
  }

  // Ambient flicker — one machine every 7 s, cycling through each in order
  if (now - lastAmbientTick >= AMBIENT_EVERY) {
    lastAmbientTick = now;
    const all = [...clickables.values()].filter(i => i.on && i.flickerStart === null && !i.isStrip);
    if (all.length) {
      ambientRRIndex = ambientRRIndex % all.length;
      ambientItem    = all[ambientRRIndex];
      ambientStart   = now;
      ambientRRIndex = (ambientRRIndex + 1) % all.length;
    }
  }

  if (ambientItem !== null) {
    const elapsed = now - ambientStart;
    if (elapsed >= AMBIENT_DUR) {
      ambientItem.mat.emissiveIntensity = ambientItem.onInt;
      ambientItem.light.intensity       = ambientItem.onLit;
      ambientItem = null;
    } else {
      const t   = elapsed / AMBIENT_DUR;
      const env = Math.sin(t * Math.PI);               // bell: 0 → 1 → 0
      const osc = Math.sin(now * 0.09) * 0.5 + 0.5;   // irregular texture
      const dip = env * osc * 0.55;
      ambientItem.mat.emissiveIntensity = ambientItem.onInt  * (1 - dip);
      ambientItem.light.intensity       = ambientItem.onLit  * (1 - dip * 0.5);
    }
  }

  // Animate game screens + controls when machines are on
  const gT = now * 0.001;

  // cab1 — Space Blasters
  { const item = clickables.get(cab1.screen);
    if (item.on) {
      if (item.flickerStart !== null) {
        drawBootScreen(cab1.screenCtx, 256, 192);
      } else {
        drawSpaceGame(cab1.screenCtx, 256, 192, gT);
        const c = cab1.ctrl;
        c.js.rotation.z = _sb.dir * -0.26;                                    // joystick follows alien march
        c.fire.position.y = c.fireBaseY - (_sb.bulletY > 0 ? 0.055 : 0);     // fire button depresses on shot
      }
      cab1.screenTex.needsUpdate = true;
    }
  }

  // cab2 — Street Kombat
  { const item = clickables.get(cab2.screen);
    if (item.on) {
      if (item.flickerStart !== null) {
        drawBootScreen(cab2.screenCtx, 256, 192);
      } else {
        drawFightGame(cab2.screenCtx, 256, 192, gT);
        const c = cab2.ctrl;
        c.js.rotation.z = _sk.p1a === 1 ?  0.25 : 0;   // joystick tilts on punch
        c.js.rotation.x = _sk.p1a === 2 ? -0.25 : 0;   // joystick tilts on kick
        c.btns.forEach((btn, i) => {
          const active = (i === 0 && _sk.p1a === 1) || (i === 2 && _sk.p1a === 2);
          btn.position.y = c.btnsBaseY[i] - (active ? 0.055 : 0);
        });
      }
      cab2.screenTex.needsUpdate = true;
    }
  }

  // cab3 — Turbo Drift
  { const item = clickables.get(cab3.screen);
    if (item.on) {
      if (item.flickerStart !== null) {
        drawBootScreen(cab3.screenCtx, 256, 192);
      } else {
        drawRaceGame(cab3.screenCtx, 256, 192, gT);
        const c = cab3.ctrl;
        c.whl.rotation.z = Math.sin(gT * 0.9) * 0.40;             // wheel slowly turns
        c.gas.position.y = c.gasBaseY - 0.03;                      // gas held down while racing
      }
      cab3.screenTex.needsUpdate = true;
    }
  }

  renderer.render(scene, camera);
})();

// ── Resize ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const a = window.innerWidth / window.innerHeight;
  camera.left = -V * a; camera.right = V * a;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
