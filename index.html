<canvas id="c"></canvas>
<script type="module">
'use strict';
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { RectAreaLightUniformsLib } from 'three/addons/lights/RectAreaLightUniformsLib.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ── Renderer ──────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.35;

RectAreaLightUniformsLib.init();

// ── Scene ─────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x100906);
scene.fog = new THREE.FogExp2(0x100906, 0.008);
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
pmrem.dispose();

// ── Camera ────────────────────────────────────────────────
const aspect = window.innerWidth / window.innerHeight;
const V = 13;
const camera = new THREE.OrthographicCamera(-V * aspect, V * aspect, V, -V, 0.1, 200);
camera.position.set(22, 22, 22);
camera.lookAt(0, 3, 0);

// ── Lighting ──────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffc890, 0.12));
const sun = new THREE.DirectionalLight(0xffd4a0, 0.08);
sun.position.set(14, 28, 14);
sun.castShadow = true;
sun.shadow.camera.left = sun.shadow.camera.bottom = -22;
sun.shadow.camera.right = sun.shadow.camera.top   =  22;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.bias = -0.001;
scene.add(sun);

// ── Helpers ───────────────────────────────────────────────
const _mc = {};
const mat = hex => _mc[hex] || (_mc[hex] = new THREE.MeshStandardMaterial({ color: hex, roughness: 0.85, metalness: 0 }));

const _me = {};
function eMat(hex, intensity) {
  const key = `${hex}:${intensity}`;
  return _me[key] || (_me[key] = new THREE.MeshStandardMaterial({
    color: hex, emissive: hex, emissiveIntensity: intensity, roughness: 0.4
  }));
}

function lpMat(hex, roughness = 0.65, metalness = 0) {
  return new THREE.MeshStandardMaterial({ color: hex, flatShading: true, roughness, metalness });
}

const std = (hex, rough = 0.75, metal = 0.06, flat = false) =>
  new THREE.MeshStandardMaterial({ color: hex, roughness: rough, metalness: metal, flatShading: flat });

const em = (hex, intensity = 0) =>
  new THREE.MeshStandardMaterial({ color: 0x020206, emissive: hex, emissiveIntensity: intensity, roughness: 0.35 });

function b(w, h, d, hexOrMat, x, y, z) {
  const material = typeof hexOrMat === 'number' ? mat(hexOrMat) : hexOrMat;
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
  m.position.set(x, y + h * 0.5, z);
  m.castShadow = m.receiveShadow = true;
  scene.add(m);
  return m;
}

function nb(w, h, d, hex, intensity, x, y, z) {
  return b(w, h, d, eMat(hex, intensity), x, y, z);
}

function cyl(rt, rb, h, hexOrMat, x, y, z, segs = 8) {
  const material = typeof hexOrMat === 'number' ? lpMat(hexOrMat) : hexOrMat;
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, segs), material);
  m.position.set(x, y + h * 0.5, z);
  m.castShadow = m.receiveShadow = true;
  scene.add(m);
  return m;
}

function wedge(wx, hFront, hBack, d, mat, x, yBase, z) {
  const hw = wx/2, hd = d/2;
  const v = new Float32Array([
    -hw,0,+hd,  -hw,0,-hd,  +hw,0,-hd,  +hw,0,+hd,
    -hw,0,+hd,  +hw,0,+hd,  +hw,hFront,+hd,  -hw,hFront,+hd,
    +hw,0,-hd,  -hw,0,-hd,  -hw,hBack,-hd,   +hw,hBack,-hd,
    -hw,0,+hd,  -hw,hFront,+hd,  -hw,hBack,-hd,  -hw,0,-hd,
    +hw,0,-hd,  +hw,hBack,-hd,   +hw,hFront,+hd,  +hw,0,+hd,
    -hw,hFront,+hd,  +hw,hFront,+hd,  -hw,hBack,-hd,  +hw,hBack,-hd,
  ]);
  const idx = [0,1,2,0,2,3,4,5,6,4,6,7,8,9,10,8,10,11,12,13,14,12,14,15,16,17,18,16,18,19,20,21,22,21,23,22];
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(v, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, yBase, z);
  m.castShadow = m.receiveShadow = true;
  scene.add(m);
  return m;
}

// ── Palette ───────────────────────────────────────────────
const WALL = 0x12122a, FLOOR = 0x0e0e20, TRIM = 0x1a1a3a;
const MTL = 0x3a3a58, DRK = 0x080818;
const NCN = 0x00eeff, NPN = 0xff00cc, NYL = 0xffee00, NGR = 0x00ff88;
const ABODY = 0x100e25, ASIDE = 0x1c1a3e;

// ── Room ──────────────────────────────────────────────────
b(14, 0.10, 14, new THREE.MeshStandardMaterial({ color: 0x04040e, roughness: 0.85, metalness: 0 }), 0, -0.1, 0);

const starPalette = [NPN, NCN, NYL, NGR, 0xff2200, 0xcc00ff, 0xff6600];
const ROWS = 11, COLS = 10, STEP_X = 1.52, STEP_Z = 1.40;
const START_X = -6.84, START_Z = -6.80;
for (let row = 0; row < ROWS; row++) {
  const offsetX = (row % 2) * STEP_X * 0.5;
  const pz = START_Z + row * STEP_Z;
  for (let col = 0; col < COLS; col++) {
    const px = START_X + offsetX + col * STEP_X;
    const sm = eMat(starPalette[(row * 3 + col) % starPalette.length], 2.2);
    b(0.48, 0.018, 0.10, sm, px, 0.0, pz);
    b(0.10, 0.018, 0.48, sm, px, 0.0, pz);
  }
}

{ // Wood panel walls
  const W = 128, H = 512;
  const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  const c = cv.getContext('2d');
  // Base coat — dark walnut
  c.fillStyle = '#3a1808'; c.fillRect(0, 0, W, H);
  // Grain lines — vertical, slightly wavy
  for (let i = 0; i < 220; i++) {
    const x = (i * 13.7) % W;
    const alpha = 0.03 + (i % 5) * 0.018;
    c.strokeStyle = (i % 3 === 0) ? `rgba(180,70,12,${alpha})` : `rgba(8,3,1,${alpha * 1.8})`;
    c.lineWidth = 0.4 + (i % 4) * 0.4;
    c.beginPath(); c.moveTo(x, 0);
    for (let y = 0; y <= H; y += 16) c.lineTo(x + Math.sin(y * 0.04 + i * 0.9) * 4, y);
    c.stroke();
  }
  // Knot suggestion — subtle oval darker patch
  c.fillStyle = 'rgba(12,4,1,0.22)';
  c.beginPath(); c.ellipse(W * 0.4, H * 0.35, 14, 22, 0.2, 0, Math.PI * 2); c.fill();
  // Plank seam — right edge (tiles into a seam between planks)
  c.fillStyle = 'rgba(0,0,0,0.75)'; c.fillRect(W - 2, 0, 2, H);
  c.fillStyle = 'rgba(200,90,20,0.10)'; c.fillRect(0, 0, 2, H);
  const t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  t.repeat.set(7, 1);
  const woodMat = new THREE.MeshStandardMaterial({ map: t, roughness: 0.78, metalness: 0.02 });
  b(0.3, 10, 14, woodMat, -7, 0, 0);
  b(14, 10, 0.3, woodMat,  0, 0, -7);
}
b(0.4, 0.4, 14.3, TRIM, -7, 10, 0);
b(14.3, 0.4, 0.4, TRIM,  0, 10, -7);
b(0.4, 10,  0.4,  TRIM, -7,  0, -7);
b(0.2, 0.2, 14,   TRIM, -7,  0, 0);
b(14,  0.2, 0.2,  TRIM,  0,  0, -7);

// Warm fill light — invisible, lights the whole scene
// Fluorescent ceiling panels — RectAreaLight for realistic area lighting
const fluorA = new THREE.RectAreaLight(0xfffde8, 0, 9, 7);
fluorA.position.set(-1, 9.4, -1.5); fluorA.rotation.x = -Math.PI / 2;
scene.add(fluorA);
const fluorB = new THREE.RectAreaLight(0xfffde8, 0, 9, 5);
fluorB.position.set(-1, 9.4, -5.5); fluorB.rotation.x = -Math.PI / 2;
scene.add(fluorB);


// ── Cabinet shared geometry ───────────────────────────────
const HALF_W = 0.90, WIDTH = HALF_W * 2;
const SW = WIDTH * 0.80, SH = 1.28;

const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2a2835, flatShading: true, roughness: 0.22, metalness: 0.85 });
const sideMat = new THREE.MeshStandardMaterial({ color: 0x353348, flatShading: true, roughness: 0.22, metalness: 0.85 });
const sidePanelMat = new THREE.MeshStandardMaterial({ color: 0x353348, flatShading: true, roughness: 0.22, metalness: 0.85, side: THREE.DoubleSide });

// Neon Drift 91 — one TextureLoader per surface with cover-fit repeat/offset (avoids canvas taint on file://)
function _neonTex(repeatX, repeatY, offsetX, offsetY) {
  const t = new THREE.TextureLoader().load('images/neondrift91.jpeg');
  t.colorSpace = THREE.SRGBColorSpace;
  t.wrapS = t.wrapT = THREE.ClampToEdgeWrapping;
  t.repeat.set(repeatX, repeatY);
  t.offset.set(offsetX, offsetY);
  return t;
}
// Side panel  (1.58:4.64 ≈ 1:2.94) — cover fit: show centre 34% of image width, full height
const neonDriftTex = _neonTex(0.341, 1, 0.3295, 0);
// Front panel (WIDTH×2.0 = 1.8:2.0 = 0.9:1) — cover fit: show centre 90% of image width, full height
const neonFrontTex = _neonTex(0.9, 1, 0.05, 0);
// Top panel   (WIDTH×1.26 = 1.8:1.26 ≈ 1.43:1) — cover fit: full image width, centre 70% of image height
const neonTopTex   = _neonTex(1, 0.70, 0, 0.15);

const S = new THREE.Shape();
S.moveTo(0, 0); S.lineTo(1.58, 0); S.lineTo(1.58, 2.14);
S.bezierCurveTo(1.56, 2.26, 1.36, 2.36, 1.08, 2.44);
S.bezierCurveTo(1.04, 2.72, 0.88, 3.34, 0.74, 3.96);
S.lineTo(1.56, 3.98); S.lineTo(1.56, 4.58);
S.bezierCurveTo(1.54, 4.70, 0.80, 4.74, 0.30, 4.64);
S.bezierCurveTo(0.10, 4.58, 0.00, 4.44, 0.00, 4.28);
S.lineTo(0, 0);

const shellGeo = new THREE.ExtrudeGeometry(S, {
  depth: WIDTH, bevelEnabled: true,
  bevelSize: 0.052, bevelThickness: 0.052, bevelSegments: 5, curveSegments: 16,
});

const spShape = new THREE.Shape();
spShape.moveTo(0,0); spShape.lineTo(-1.58,0); spShape.lineTo(-1.58,2.14);
spShape.bezierCurveTo(-1.56,2.26,-1.36,2.36,-1.08,2.44);
spShape.bezierCurveTo(-1.04,2.72,-0.88,3.34,-0.74,3.96);
spShape.lineTo(-1.56,3.98); spShape.lineTo(-1.56,4.58);
spShape.bezierCurveTo(-1.54,4.70,-0.80,4.74,-0.30,4.64);
spShape.bezierCurveTo(-0.10,4.58,0.00,4.44,0.00,4.28);
spShape.lineTo(0,0);
const sidePanelGeo = new THREE.ExtrudeGeometry(spShape, {
  depth: 0.20, bevelEnabled: true,
  bevelSize: 0.022, bevelThickness: 0.022, bevelSegments: 4, curveSegments: 16,
});

// Marquee canvas — shared branding
const mqCv = document.createElement('canvas');
mqCv.width = 512; mqCv.height = 160;
const mqCtx = mqCv.getContext('2d');
mqCtx.fillStyle = '#03021a'; mqCtx.fillRect(0, 0, 512, 160);
mqCtx.fillStyle = '#0d0038'; mqCtx.fillRect(0, 24, 512, 112);
mqCtx.strokeStyle = '#00eeff'; mqCtx.lineWidth = 3; mqCtx.strokeRect(6, 6, 500, 148);
mqCtx.textAlign = 'center'; mqCtx.textBaseline = 'middle';
mqCtx.font = 'bold 58px monospace';
mqCtx.shadowColor = '#00eeff'; mqCtx.shadowBlur = 36;
mqCtx.fillStyle = '#00eeff'; mqCtx.fillText('SPACE BLASTERS', 256, 74);
mqCtx.shadowBlur = 8; mqCtx.fillStyle = '#ffffff'; mqCtx.fillText('SPACE BLASTERS', 256, 74);
mqCtx.font = '20px monospace'; mqCtx.shadowColor = '#ff00cc'; mqCtx.shadowBlur = 12;
mqCtx.fillStyle = '#ff88dd'; mqCtx.fillText('INSERT COIN  ·  1 OR 2 PLAYERS', 256, 128);
const mqTexShared = new THREE.CanvasTexture(mqCv);

const AZ = -6.05;

function drawSidePanelArt(ctx, W, H, type) {
  ctx.clearRect(0, 0, W, H);

  if (type === 'space') {
    // ── SPACE BLASTERS — synthwave arcade side-panel art ────

    // Deep purple-blue background
    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#050010'); bg.addColorStop(0.35,'#1a0540'); bg.addColorStop(0.65,'#0d0a35'); bg.addColorStop(1,'#050010');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // Pink nebula wash
    const neb=ctx.createRadialGradient(W*.3,H*.45,20,W*.3,H*.45,180);
    neb.addColorStop(0,'rgba(180,0,120,.18)'); neb.addColorStop(.5,'rgba(80,0,140,.1)'); neb.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=neb; ctx.fillRect(0,0,W,H);
    // Cyan nebula
    const neb2=ctx.createRadialGradient(W*.75,H*.3,10,W*.75,H*.3,140);
    neb2.addColorStop(0,'rgba(0,180,255,.12)'); neb2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=neb2; ctx.fillRect(0,0,W,H);

    // Vertical light beams (like Neon Drift sky shafts)
    [W*.18,W*.44,W*.62,W*.83].forEach(bx=>{
      const bl=ctx.createLinearGradient(0,0,0,H*.5);
      bl.addColorStop(0,'rgba(100,160,255,.08)'); bl.addColorStop(1,'rgba(100,160,255,0)');
      ctx.fillStyle=bl; ctx.fillRect(bx-8,0,16,H*.5);
    });

    // Stars
    for(let i=0;i<120;i++){
      const sx=(i*179+i*i*17)%W, sy=(i*131+i*i*11)%(H*.75);
      ctx.globalAlpha=.3+(i%6)*.1;
      ctx.fillStyle=(i%11===0)?'#ff88cc':(i%7===0)?'#88ddff':'#ffffff';
      ctx.beginPath(); ctx.arc(sx,sy,(i%4)*.4+.25,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // ── SIDE SILHOUETTES (space stations like buildings) ────
    ctx.fillStyle='#0e001e';
    [[0,H*.22,32,H*.56],[0,H*.32,46,H*.38],[4,H*.42,24,H*.3]].forEach(([sx,sy,sw,sh])=>ctx.fillRect(sx,sy,sw,sh));
    ctx.fillStyle='rgba(0,245,255,.35)'; ctx.shadowColor='#00f5ff'; ctx.shadowBlur=5;
    [[6,H*.26],[14,H*.36],[8,H*.46],[20,H*.52],[10,H*.58]].forEach(([wx,wy])=>ctx.fillRect(wx,wy,5,3));
    ctx.fillStyle='#0e001e';
    [[W-34,H*.24,34,H*.5],[W-48,H*.34,48,H*.36],[W-30,H*.44,30,H*.28]].forEach(([sx,sy,sw,sh])=>ctx.fillRect(sx,sy,sw,sh));
    ctx.fillStyle='rgba(255,0,110,.35)'; ctx.shadowColor='#ff006e'; ctx.shadowBlur=5;
    [[W-14,H*.28],[W-24,H*.38],[W-10,H*.48],[W-32,H*.42],[W-18,H*.54]].forEach(([wx,wy])=>ctx.fillRect(wx,wy,5,3));
    ctx.shadowBlur=0;

    // Circuit edge accents
    ctx.strokeStyle='rgba(0,220,255,.2)'; ctx.lineWidth=1;
    [[0,H*.52,14,H*.52],[14,H*.52,14,H*.58],[14,H*.58,22,H*.58],[0,H*.64,20,H*.64],[20,H*.64,20,H*.72]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
    ctx.strokeStyle='rgba(255,80,180,.2)';
    [[W,H*.54,W-16,H*.54],[W-16,H*.54,W-16,H*.62],[W,H*.68,W-18,H*.68],[W-18,H*.68,W-18,H*.76]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});

    // ── PERSPECTIVE ENERGY TRAILS ─────────────────────────────
    const VP=[W*.5,H*.58];
    const tColors=['#ff006e','#00f5ff','#ffd700','#ff006e','#9b30ff','#00f5ff'];
    [-0.28,-0.16,-0.06,0.06,0.16,0.28].forEach((da,i)=>{
      const tx=VP[0]+Math.sin(da)*900, ty=VP[1]+Math.cos(da)*900;
      const tg=ctx.createLinearGradient(VP[0],VP[1],tx,ty);
      tg.addColorStop(0,'rgba(0,0,0,0)'); tg.addColorStop(.25,tColors[i]+'33'); tg.addColorStop(1,tColors[i]+'bb');
      ctx.strokeStyle=tg; ctx.lineWidth=1.5+(i%2);
      ctx.shadowColor=tColors[i]; ctx.shadowBlur=8; ctx.globalAlpha=.7;
      ctx.beginPath(); ctx.moveTo(VP[0],VP[1]); ctx.lineTo(tx,ty); ctx.stroke();
    });
    ctx.globalAlpha=1; ctx.shadowBlur=0;

    // ── HERO SPACESHIP (lower panel) ─────────────────────────
    const shx=W*.52, shy=H*.73;

    // Engine exhaust radial glow
    const exh=ctx.createRadialGradient(shx,shy+18,4,shx,shy+18,52);
    exh.addColorStop(0,'rgba(255,100,255,.9)'); exh.addColorStop(.35,'rgba(200,0,255,.5)'); exh.addColorStop(.7,'rgba(80,0,200,.2)'); exh.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=exh; ctx.globalAlpha=.85; ctx.fillRect(shx-60,shy-10,120,90); ctx.globalAlpha=1;

    // Speed streak trails (like drift smoke)
    ctx.save();
    [{x:shx-20,c:'#00f5ff'},{x:shx+2,c:'#ff006e'},{x:shx+20,c:'#00f5ff'},{x:shx-8,c:'#ffd700'},{x:shx+30,c:'#ff006e'}].forEach(({x,c})=>{
      const sg=ctx.createLinearGradient(0,shy+18,0,H*.92);
      sg.addColorStop(0,c); sg.addColorStop(1,c+'00');
      ctx.strokeStyle=sg; ctx.lineWidth=1.5; ctx.shadowColor=c; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.moveTo(x,shy+18); ctx.lineTo(x+(x-shx)*.25,H*.92); ctx.stroke();
    });
    ctx.restore();

    // Engine pods
    [[shx-22,shy+14],[shx+22,shy+14]].forEach(([ex,ey])=>{
      const epg=ctx.createLinearGradient(0,ey-10,0,ey+14);
      epg.addColorStop(0,'#442266'); epg.addColorStop(.5,'#7733aa'); epg.addColorStop(1,'#220033');
      ctx.fillStyle=epg; ctx.beginPath(); ctx.ellipse(ex,ey,10,14,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#000000'; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(ex,ey,10,14,0,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle='#9900ff'; ctx.lineWidth=1.5; ctx.shadowColor='#9900ff'; ctx.shadowBlur=7;
      ctx.beginPath(); ctx.ellipse(ex,ey,10,14,0,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0;
      const eng=ctx.createRadialGradient(ex,ey+14,1,ex,ey+14,12);
      eng.addColorStop(0,'#ffffff'); eng.addColorStop(.3,'#ff80ff'); eng.addColorStop(1,'rgba(140,0,255,0)');
      ctx.fillStyle=eng; ctx.globalAlpha=.9; ctx.beginPath(); ctx.ellipse(ex,ey+14,9,7,0,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
    });

    // Left wing
    ctx.fillStyle='#1a0540';
    ctx.beginPath(); ctx.moveTo(shx-10,shy-8); ctx.lineTo(shx-56,shy+18); ctx.lineTo(shx-50,shy+34); ctx.lineTo(shx-12,shy+10); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#000000'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(shx-10,shy-8); ctx.lineTo(shx-56,shy+18); ctx.lineTo(shx-50,shy+34); ctx.lineTo(shx-12,shy+10); ctx.closePath(); ctx.stroke();
    // Wing cyan leading edge
    const lwg=ctx.createLinearGradient(shx-10,shy-8,shx-56,shy+18);
    lwg.addColorStop(0,'#00f5ff'); lwg.addColorStop(1,'#00f5ff44');
    ctx.strokeStyle=lwg; ctx.lineWidth=2.5; ctx.shadowColor='#00f5ff'; ctx.shadowBlur=9;
    ctx.beginPath(); ctx.moveTo(shx-10,shy-8); ctx.lineTo(shx-56,shy+18); ctx.stroke(); ctx.shadowBlur=0;
    // Wing pink livery stripe
    ctx.strokeStyle='#ff006e'; ctx.lineWidth=2; ctx.shadowColor='#ff006e'; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.moveTo(shx-18,shy+2); ctx.lineTo(shx-48,shy+20); ctx.stroke(); ctx.shadowBlur=0;

    // Right wing (mirror)
    ctx.fillStyle='#1a0540';
    ctx.beginPath(); ctx.moveTo(shx+10,shy-8); ctx.lineTo(shx+56,shy+18); ctx.lineTo(shx+50,shy+34); ctx.lineTo(shx+12,shy+10); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#000000'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(shx+10,shy-8); ctx.lineTo(shx+56,shy+18); ctx.lineTo(shx+50,shy+34); ctx.lineTo(shx+12,shy+10); ctx.closePath(); ctx.stroke();
    const rwg=ctx.createLinearGradient(shx+10,shy-8,shx+56,shy+18);
    rwg.addColorStop(0,'#00f5ff'); rwg.addColorStop(1,'#00f5ff44');
    ctx.strokeStyle=rwg; ctx.lineWidth=2.5; ctx.shadowColor='#00f5ff'; ctx.shadowBlur=9;
    ctx.beginPath(); ctx.moveTo(shx+10,shy-8); ctx.lineTo(shx+56,shy+18); ctx.stroke(); ctx.shadowBlur=0;
    ctx.strokeStyle='#ff006e'; ctx.lineWidth=2; ctx.shadowColor='#ff006e'; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.moveTo(shx+18,shy+2); ctx.lineTo(shx+48,shy+20); ctx.stroke(); ctx.shadowBlur=0;

    // Hull body — dark purple metallic

    ctx.fillStyle=hg;
    ctx.beginPath();

    // Black outline (bold like Neon Drift car)

    // Cyan edge glow

    // Pink livery stripes (like car paint markings)

    ctx.beginPath(); ctx.moveTo(shx-14,shy-28); ctx.lineTo(shx+14,shy-8); ctx.stroke();
    ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(shx-12,shy-14); ctx.lineTo(shx+12,shy+4); ctx.stroke();
    ctx.shadowBlur=0;

    // Cockpit (tinted)
    const cpg=ctx.createRadialGradient(shx-3,shy-30,2,shx,shy-22,12);
    cpg.addColorStop(0,'#ccaaff'); cpg.addColorStop(.5,'#5522cc'); cpg.addColorStop(1,'#110033');

    ctx.strokeStyle='#000000'; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(shx,shy-24,10,14,0,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(220,200,255,.5)'; ctx.beginPath(); ctx.ellipse(shx-2,shy-30,4,5,-.3,0,Math.PI*2); ctx.fill();

    // Front cannon

    ctx.strokeRect(shx-3,shy-62,6,14); ctx.shadowBlur=0;

    // ── TITLE BLOCK (graffiti / Neon Drift style) ────────────

    ctx.lineWidth=2; ctx.strokeStyle='#00f5ff'; ctx.shadowColor='#00f5ff'; ctx.shadowBlur=16;
    ctx.strokeText('SPACE',W*.5,H*.075);
    ctx.fillStyle='#00f5ff'; ctx.fillText('SPACE',W*.5,H*.075); ctx.shadowBlur=0;

    // "BLASTERS" — hot pink graffiti
    ctx.font='bold 24px Impact, Arial Black, sans-serif';
    ctx.lineWidth=7; ctx.strokeStyle='#000000'; ctx.strokeText('BLASTERS',W*.5,H*.12);
    ctx.lineWidth=2; ctx.strokeStyle='#ff006e'; ctx.shadowColor='#ff006e'; ctx.shadowBlur=16;
    ctx.strokeText('BLASTERS',W*.5,H*.12);
    ctx.fillStyle='#ff006e'; ctx.fillText('BLASTERS',W*.5,H*.12); ctx.shadowBlur=0;

    // ── BOTTOM STRIP ─────────────────────────────────────────
    ctx.fillStyle='rgba(0,0,20,.85)'; ctx.fillRect(0,H*.93,W,H*.07);
    ctx.font='bold 9px monospace';
    ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=5;
    ctx.fillText('INSERT COIN — 1 OR 2 PLAYERS',W*.5,H*.965); ctx.shadowBlur=0;

    // Panel border — hot pink glow
    ctx.strokeStyle='#ff006e'; ctx.lineWidth=3; ctx.shadowColor='#ff006e'; ctx.shadowBlur=10;
    ctx.strokeRect(2,2,W-4,H-4); ctx.shadowBlur=0;

  } else {
    // fight / race — plain dark grey for now
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,W,H);
  }
}

function makeCabinet(ax, az, type) {
  const group = new THREE.Group();
  group.position.set(ax, 0, az - 0.79);
  scene.add(group);

  const localBodyMat = new THREE.MeshStandardMaterial({
    color: type === 'space' ? 0x2a2835 : 0x2a2a2a,
    flatShading: true, roughness: 0.22, metalness: 0.85,
  });

  // Side panel materials — image on right outer face only; walls + left panel stay dark
  let rightPanelMat, leftPanelMat;
  if (type === 'space') {
    const capMat = new THREE.MeshStandardMaterial({
      map: neonDriftTex, roughness: 0.80, metalness: 0.05, side: THREE.FrontSide,
    });
    rightPanelMat = [capMat, localBodyMat]; // image on profile caps, dark on extruded edges
    leftPanelMat = localBodyMat;
  } else {
    const sideCv = document.createElement('canvas'); sideCv.width=256; sideCv.height=768;
    drawSidePanelArt(sideCv.getContext('2d'), 256, 768, type);
    const sideTex = new THREE.CanvasTexture(sideCv);
    const sharedMat = new THREE.MeshStandardMaterial({
      map: sideTex, roughness: 0.80, metalness: 0.05, side: THREE.DoubleSide,
    });
    rightPanelMat = leftPanelMat = sharedMat;
  }

  // Shell
  const shell = new THREE.Mesh(shellGeo, localBodyMat);
  shell.rotation.y = -Math.PI / 2;
  shell.position.set(HALF_W, 0, 0);
  shell.castShadow = shell.receiveShadow = true;
  group.add(shell);

  // Front + top image panels for space cabinet
  if (type === 'space') {
    const mkSurf = (tex) => new THREE.MeshStandardMaterial({
      map: tex, roughness: 0.85, side: THREE.DoubleSide,
    });
    // Front face: sits just in front of the shell's front wall (z ≈ 1.58)
    const fp = new THREE.Mesh(new THREE.PlaneGeometry(WIDTH, 2.0), mkSurf(neonFrontTex));
    fp.position.set(0, 1.0, 1.62);
    group.add(fp);
    // Top face: flat plane at the roof, rotated to face up
    const tp = new THREE.Mesh(new THREE.PlaneGeometry(WIDTH, 1.26), mkSurf(neonTopTex));
    tp.rotation.x = -Math.PI / 2;
    tp.position.set(0, 4.682, 0.93);
    group.add(tp);
  }

  // Screen
  const screenCv = document.createElement('canvas');
  screenCv.width = 256; screenCv.height = 192;
  const screenTex = new THREE.CanvasTexture(screenCv);
  const screenCtx = screenCv.getContext('2d');
  const screenMat = new THREE.MeshStandardMaterial({
    color: 0x000000, map: screenTex, emissiveMap: screenTex,
    emissive: new THREE.Color(1, 1, 1), emissiveIntensity: 0, roughness: 0.2,
  });
  const screen = new THREE.Mesh(new RoundedBoxGeometry(SW, SH, 0.10, 4, 0.05), screenMat);
  screen.position.set(0, 3.10, 1.15); screen.rotation.x = -0.34;
  group.add(screen);

  const bezel = new THREE.Mesh(new RoundedBoxGeometry(SW + 0.15, SH + 0.15, 0.07, 4, 0.04), std(0x060612, 0.88));
  bezel.position.set(0, 3.10, 1.14); bezel.rotation.x = -0.34;
  group.add(bezel);

  // Side panels — right shows art, left stays dark, both excluded from click detection
  const rp = new THREE.Mesh(sidePanelGeo, rightPanelMat);
  rp.rotation.y = Math.PI / 2; rp.position.set(HALF_W, 0, 0); rp.castShadow = true;
  rp.userData.noClick = true; group.add(rp);
  const lp = new THREE.Mesh(sidePanelGeo, leftPanelMat);
  lp.rotation.y = Math.PI / 2; lp.position.set(-(HALF_W + 0.20), 0, 0); lp.castShadow = true;
  lp.userData.noClick = true; group.add(lp);

  // Control panel slab
  const cp = new THREE.Mesh(new RoundedBoxGeometry(WIDTH * 1.06, 0.10, 0.62, 4, 0.05), std(0x16122e, 0.72, 0.04, true));
  cp.position.set(0, 2.29, 1.33); cp.rotation.x = -0.54;
  group.add(cp);

  const ctrl = {};

  if (type === 'space') {
    // Joystick left + big fire button right
    const jsBase = new THREE.Mesh(new THREE.CylinderGeometry(0.072, 0.084, 0.058, 12), std(0x1a1828, 0.6, 0.1));
    jsBase.position.set(-0.35, 2.34, 1.36); group.add(jsBase);
    const jsShaft = new THREE.Mesh(new THREE.CapsuleGeometry(0.032, 0.28, 4, 8), std(0x101018, 0.5, 0.2));
    jsShaft.position.set(-0.35, 2.58, 1.36); group.add(jsShaft);
    const jsTop = new THREE.Mesh(new THREE.CylinderGeometry(0.048, 0.048, 0.05, 8), std(0x222233, 0.4, 0.2));
    jsTop.position.set(-0.35, 2.74, 1.36); group.add(jsTop);
    const fire = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.11, 0.10, 14), std(0xff1133, 0.4, 0.08));
    fire.position.set(0.35, 2.28, 1.40); group.add(fire);
    ctrl.js = jsShaft; ctrl.fire = fire; ctrl.fireBaseY = fire.position.y;

  } else if (type === 'fight') {
    // Joystick left + 2×2 coloured button grid right
    const jsBase = new THREE.Mesh(new THREE.CylinderGeometry(0.072, 0.084, 0.058, 12), std(0x1a1828, 0.6, 0.1));
    jsBase.position.set(-0.35, 2.34, 1.36); group.add(jsBase);
    const jsShaft = new THREE.Mesh(new THREE.CapsuleGeometry(0.032, 0.28, 4, 8), std(0x101018, 0.5, 0.2));
    jsShaft.position.set(-0.35, 2.58, 1.36); group.add(jsShaft);
    const jsTop = new THREE.Mesh(new THREE.CylinderGeometry(0.048, 0.048, 0.05, 8), std(0x222233, 0.4, 0.2));
    jsTop.position.set(-0.35, 2.74, 1.36); group.add(jsTop);
    const BTNCOLS = [0xff1133, NCN, NYL, NGR];
    const bpos = [
      [0.14, 2.28, 1.44], [0.38, 2.26, 1.44],
      [0.14, 2.34, 1.30], [0.38, 2.32, 1.30],
    ];
    ctrl.btns = bpos.map(([x, y, z], i) => {
      const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.077, 0.077, 0.065, 14), std(BTNCOLS[i], 0.4, 0.08));
      btn.position.set(x, y, z); group.add(btn); return btn;
    });
    ctrl.js = jsShaft; ctrl.btnsBaseY = ctrl.btns.map(b => b.position.y);

  } else {
    // Steering wheel centred + green gas pedal (left) + red brake (right) — no joystick
    const whl = new THREE.Mesh(new THREE.TorusGeometry(0.20, 0.038, 6, 12), lpMat(0x1a1a2a, 0.5));
    whl.rotation.x = Math.PI / 2.8; whl.position.set(0.0, 2.74, 1.28);
    whl.castShadow = true; group.add(whl);
    const whlHub = new THREE.Mesh(new THREE.CylinderGeometry(0.048, 0.048, 0.05, 6), std(0x333344, 0.4));
    whlHub.position.set(0.0, 2.74, 1.28); group.add(whlHub);
    const gas = new THREE.Mesh(new THREE.CylinderGeometry(0.077, 0.077, 0.065, 14), std(NGR, 0.4, 0.08));
    gas.position.set(-0.26, 2.28, 1.40); group.add(gas);
    const brk = new THREE.Mesh(new THREE.CylinderGeometry(0.077, 0.077, 0.065, 14), std(0xff2200, 0.4, 0.08));
    brk.position.set(0.26, 2.28, 1.40); group.add(brk);
    ctrl.whl = whl; ctrl.gas = gas; ctrl.gasBaseY = gas.position.y;
  }

  // Coin door
  const door = new THREE.Mesh(new RoundedBoxGeometry(WIDTH * 0.56, 1.08, 0.05, 4, 0.04), std(0x0b0920, 0.88, 0.06));
  door.position.set(0, 0.94, 1.555); group.add(door);
  [-0.17, 0.17].forEach(x => {
    const h = new THREE.Mesh(new RoundedBoxGeometry(0.24, 0.10, 0.06, 4, 0.02), std(0x0e0c22, 0.90));
    h.position.set(x, 1.36, 1.575); group.add(h);
    const o = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.018, 0.08), std(0x010104, 0.98));
    o.position.set(x, 1.36, 1.585); group.add(o);
  });
  [{ x: -0.17, col: 0xcc1800 }, { x: 0.17, col: 0xddaa00 }].forEach(({ x, col }) => {
    const s = new THREE.Mesh(new THREE.CylinderGeometry(0.058, 0.058, 0.05, 14), std(col, 0.38, 0.06));
    s.position.set(x, 1.06, 1.585); group.add(s);
  });
  const rb = new THREE.Mesh(new THREE.CylinderGeometry(0.028, 0.028, 0.038, 12), std(0x707090, 0.38, 0.35));
  rb.position.set(0, 0.72, 1.585); group.add(rb);
  const rt = new THREE.Mesh(new RoundedBoxGeometry(0.26, 0.06, 0.14, 4, 0.02), std(0x09071a, 0.72, 0.12));
  rt.position.set(0, 0.46, 1.51); group.add(rt);

  // Marquee sign
  const mqSignMat = new THREE.MeshStandardMaterial({
    map: mqTexShared, emissiveMap: mqTexShared,
    emissive: new THREE.Color(1, 1, 1), emissiveIntensity: 0, roughness: 0.3,
  });
  const mqSign = new THREE.Mesh(new THREE.PlaneGeometry(WIDTH + 0.24, 0.66), mqSignMat);
  mqSign.position.set(0, 4.28, 1.62); group.add(mqSign);

  const rightNeonMat = em(NCN, 0);
  const leftNeonMat  = em(NPN, 0);

  const light = new THREE.PointLight(NCN, 0, 22);
  light.position.set(0, 3.40, 2.00); group.add(light);

  const neons = [
    { mat: rightNeonMat, onInt: 2.8 },
    { mat: leftNeonMat,  onInt: 3.2 },
    { mat: mqSignMat,    onInt: 2.8 },
  ];

  return { group, screen, screenMat, screenCtx, screenTex, light, ctrl, neons };
}

function applyMarquee(ax, name, hexColor) {
  const W = 512, H = 128;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  const css = `#${hexColor.toString(16).padStart(6, '0')}`;
  ctx.fillStyle = '#000008'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 52px monospace';
  ctx.shadowColor = css; ctx.shadowBlur = 32; ctx.fillStyle = css; ctx.fillText(name, W/2, H/2);
  ctx.shadowBlur = 14; ctx.fillText(name, W/2, H/2);
  ctx.shadowBlur = 6; ctx.fillStyle = '#ffffff'; ctx.fillText(name, W/2, H/2);
  const tex = new THREE.CanvasTexture(cv);
  const mq = new THREE.Mesh(
    new THREE.PlaneGeometry(1.74, 0.52),
    new THREE.MeshStandardMaterial({
      map: tex, emissiveMap: tex,
      emissive: new THREE.Color(1, 1, 1), emissiveIntensity: 0,
      roughness: 0.3, transparent: true,
    })
  );
  mq.position.set(ax, 4.46, AZ + 0.83);
  scene.add(mq);
  return mq.material;
}

  item.on=true; item.flickerStart=performance.now(); item.light.intensity=item.onLit;
  if(item.neons) for(const n of item.neons) n.mat.emissiveIntensity=n.onInt;
}
function turnOff(item){
  item.on=false; item.flickerStart=null; item.mat.emissiveIntensity=item.offInt;
  item.light.intensity=item.offLit;
  if(item.neons) for(const n of item.neons) n.mat.emissiveIntensity=0;
}

const raycaster=new THREE.Raycaster(), mouse=new THREE.Vector2();

canvas.addEventListener('click', e=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  if(raycaster.intersectObject(switchHitArea).length){
    powerOn=!powerOn;
    powerSwitch.position.y=powerOn?LEVER_ON_Y:LEVER_OFF_Y;
    const ledColor=powerOn?0x00ff44:0x00eeff;
    switchLedMat.color.set(ledColor); switchLedMat.emissive.set(ledColor);
    if(powerOn){ switchLedMat.emissiveIntensity=2.5; switchGlowLight.color.set(0x00ff44); switchGlowLight.intensity=0; }
    else { switchGlowLight.color.set(0x00eeff); }
    for(const item of clickables.values()) powerOn?turnOn(item):turnOff(item);
    for(const s of signControls){ s.mat.emissiveIntensity=powerOn?s.onEI:0; s.light.intensity=powerOn?s.onLit:0; }
    fluorA.intensity = fluorB.intensity = powerOn ? 14 : 0;
    lbMesh.visible=powerOn; return;
  }
  const hit=raycaster.intersectObjects(hitMeshes)[0];
  if(!hit) return;
  const item=clickables.get(hit.object);
  item.on?turnOff(item):turnOn(item);
  if(hit.object===pinballBack||hit.object===pinBody||hit.object===playMesh) lbMesh.visible=item.on;
});

canvas.addEventListener('mousemove', e=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  canvas.style.cursor=raycaster.intersectObjects([...hitMeshes,switchHitArea]).length>0?'pointer':'default';
});

// ── Auto power-on ─────────────────────────────────────────
powerOn = true;
powerSwitch.position.y = LEVER_ON_Y;
switchLedMat.color.set(0x00ff44); switchLedMat.emissive.set(0x00ff44);
switchLedMat.emissiveIntensity = 2.5;
switchGlowLight.color.set(0x00ff44); switchGlowLight.intensity = 0;
const _uniqueItems = new Set(clickables.values());
for (const item of _uniqueItems) turnOn(item);
for(const s of signControls){ s.mat.emissiveIntensity=s.onEI; s.light.intensity=s.onLit; }
fluorA.intensity = fluorB.intensity = 1.5;
lbMesh.visible = true;

// ── Game animations ───────────────────────────────────────
function drawBootScreen(ctx,W,H){
  const img=ctx.createImageData(W,H); const d=img.data;
  for(let i=0;i<d.length;i+=4){const v=Math.random()*180|0; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255;}
  ctx.putImageData(img,0,0);
}

const _sb={alienOffX:8,dir:1,alienY:20,bulletY:-1,cooldown:0,score:1840,ft:0};
function drawSpaceGame(ctx,W,H,t){
  const dt=Math.min(t-_sb.ft,0.1); _sb.ft=t;
  ctx.fillStyle='#000010'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';
  for(let i=0;i<28;i++) ctx.fillRect((i*47+13)%W,(i*61+7)%H,1+(i%2),1+(i%2));
  const ph=Math.floor(t*2.5)%2;
  ['#ff44aa','#ff8844','#44ddff'].forEach((col,row)=>{
    ctx.fillStyle=col;
    for(let c=0;c<8;c++){
      const ax2=_sb.alienOffX+c*26,ay=_sb.alienY+row*20;
      ctx.fillRect(ax2+4,ay,8,3); ctx.fillRect(ax2+2,ay+3,12,6);
      ctx.fillRect(ax2+4,ay+9,8,2); ctx.fillRect(ax2+(ph?1:2),ay+11,3,3); ctx.fillRect(ax2+(ph?10:11),ay+11,3,3);
    }
  });
  _sb.alienOffX+=_sb.dir*38*dt;
  if(_sb.alienOffX>W-218||_sb.alienOffX<4){_sb.dir*=-1;_sb.alienY+=4;if(_sb.alienY>H-60)_sb.alienY=20;}
  const px=W*0.5,py=H-16;
  ctx.fillStyle='#88ffff'; ctx.fillRect(px-2,py-5,4,5); ctx.fillRect(px-9,py,18,6); ctx.fillRect(px-13,py+3,26,2);
  ctx.fillStyle='#ff5500'; ctx.fillRect(px-4,py+8,8,2+(Math.sin(t*18)*1.5|0));
  _sb.cooldown-=dt;
  if(_sb.bulletY<0&&_sb.cooldown<=0){_sb.bulletY=py-5;_sb.cooldown=1.0;}
  if(_sb.bulletY>=0){
    _sb.bulletY-=95*dt;
    ctx.fillStyle='#ffff00'; ctx.fillRect(px-1,_sb.bulletY,2,9);
    if(_sb.bulletY<0){_sb.bulletY=-1;_sb.score+=50;}
  }
  ctx.fillStyle='#00ff88'; ctx.font='bold 9px monospace'; ctx.fillText(`SCORE  ${_sb.score}`,4,13);
}

const _sk={p1h:0.72,p2h:0.45,p1a:0,p2a:0,acd:0,ft:0};
function _fighter(ctx,x,gy,dir,bob,action){
  const f=dir; const cs=dir>0?'#4466ff':'#ff3322', fs=dir>0?'#99aaff':'#ff9988'; const fy=gy+bob;
  ctx.fillStyle=cs; ctx.fillRect(x-12,fy-52,24,24); ctx.fillRect(x-8,fy-68,16,16);
  ctx.fillStyle=fs; ctx.fillRect(x-5,fy-65,10,7); ctx.fillStyle=cs;
  ctx.fillRect(x-7,fy-28,8,22); ctx.fillRect(x-1,fy-28,8,22);
  ctx.fillRect(x-10*f-6,fy-8,12,8); ctx.fillRect(x+1*f-3,fy-8,12,8);
  if(action===1){ctx.fillRect(x+10*f,fy-50,22*f,7); ctx.fillRect(x-20*f,fy-48,10*f,7);}
  else if(action===2){ctx.fillRect(x-8,fy-30,8,22); ctx.fillRect(x+4*f,fy-26,22*f,7);}
  else{ctx.fillRect(x+12*f,fy-52,8*f,18); ctx.fillRect(x-20*f,fy-52,8*f,18);}
}
function drawFightGame(ctx,W,H,t){
  const dt=Math.min(t-_sk.ft,0.1); _sk.ft=t;
  ctx.fillStyle='#0c0210'; ctx.fillRect(0,0,W,H);
  const gy=ctx.createLinearGradient(0,H*0.28,0,H*0.68);
  gy.addColorStop(0,'#1a0320'); gy.addColorStop(1,'#2e0530');
  ctx.fillStyle=gy; ctx.fillRect(0,H*0.28,W,H*0.4);
  ctx.fillStyle='#080010'; ctx.fillRect(0,H*0.68,W,H*0.32);
  ctx.fillStyle='#cc0033'; ctx.fillRect(0,H*0.68-1,W,2);
  ctx.fillStyle='#18002a';
  for(let i=0;i<18;i++){const cx=i*14+7,cy=H*0.28+(i%3)*5+8; ctx.beginPath(); ctx.arc(cx,cy,5.5,Math.PI,0); ctx.fill(); ctx.fillRect(cx-5,cy,10,12);}
  const floorY=H*0.68;
  ctx.fillStyle='#440000'; ctx.fillRect(4,4,90,10); ctx.fillStyle='#ee2200'; ctx.fillRect(4,4,90*_sk.p1h,10);
  ctx.fillStyle='#440000'; ctx.fillRect(W-94,4,90,10); const pw=90*_sk.p2h; ctx.fillStyle='#ee2200'; ctx.fillRect(W-4-pw,4,pw,10);
  ctx.fillStyle='#ffdd00'; ctx.font='bold 9px monospace'; ctx.textAlign='center'; ctx.fillText('34',W/2,14); ctx.textAlign='left';
  const bob=Math.sin(t*4)*2.5;
  _fighter(ctx,W*0.28,floorY,1,bob,_sk.p1a); _fighter(ctx,W*0.72,floorY,-1,-bob,_sk.p2a);
  _sk.acd-=dt;
  if(_sk.acd<=0){_sk.p1a=Math.random()>0.45?1:0;_sk.p2a=Math.random()>0.55?2:0;_sk.acd=0.5+Math.random()*0.9;}
}

const _td={ro:0,speed:178,ft:0,trees:Array.from({length:6},(_,i)=>({s:i<3?-1:1,p:i*0.17}))};
function drawRaceGame(ctx,W,H,t){
  const dt=Math.min(t-_td.ft,0.1); _td.ft=t; _td.ro=(_td.ro+dt*0.65)%1;
  const sky=ctx.createLinearGradient(0,0,0,H*0.46); sky.addColorStop(0,'#000820'); sky.addColorStop(1,'#051838');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.46);
  ctx.fillStyle='#090e1e'; ctx.beginPath(); ctx.moveTo(0,H*0.46);
  for(let i=0;i<=9;i++) ctx.lineTo(i*W/9,H*0.46-(((i*7+3)%5)*11+8));
  ctx.lineTo(W,H*0.46); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#04100a'; ctx.fillRect(0,H*0.46,W,H*0.54);
  ctx.fillStyle='#181820'; ctx.beginPath(); ctx.moveTo(W*0.18,H); ctx.lineTo(W*0.82,H); ctx.lineTo(W/2+3,H*0.46); ctx.lineTo(W/2-3,H*0.46); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#bbbb33'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(W*0.18,H); ctx.lineTo(W/2-3,H*0.46); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.82,H); ctx.lineTo(W/2+3,H*0.46); ctx.stroke();
  for(let i=0;i<9;i++){const p=((i/9)+_td.ro)%1,y=H*0.46+(H-H*0.46)*p,hw=0.5+p*2.5; ctx.fillStyle='#ffff44'; ctx.fillRect(W/2-hw,y,hw*2,Math.max(2,p*8));}
  for(const tr of _td.trees){tr.p=(tr.p+dt*0.38)%1; const p=tr.p,tx=tr.s<0?W*0.06+p*(W*0.15):W*0.94-p*(W*0.15),y=H*0.46+(H-H*0.46)*p*0.88,tw=2+p*9,th=4+p*18; ctx.fillStyle='#091c09'; ctx.fillRect(tx-tw*0.3,y-th,tw*0.6,th); ctx.fillStyle='#0d380d'; ctx.beginPath(); ctx.arc(tx,y-th,tw,0,Math.PI*2); ctx.fill();}
  const cx=W/2,cy=H-22; ctx.fillStyle='#ff3300'; ctx.fillRect(cx-12,cy-14,24,20); ctx.fillStyle='#88ccff'; ctx.fillRect(cx-9,cy-12,18,10);
  ctx.fillStyle='#111'; ctx.fillRect(cx-15,cy-5,6,11); ctx.fillRect(cx+9,cy-5,6,11);
  ctx.fillStyle='#ffff00'; ctx.fillRect(cx-13,cy-10,4,4); ctx.fillRect(cx+9,cy-10,4,4);
  ctx.fillStyle='#00ff88'; ctx.font='bold 8px monospace'; ctx.fillText(`${_td.speed} MPH`,4,12);
  ctx.textAlign='right'; ctx.fillText('LAP 2/3',W-4,12); ctx.textAlign='left';
}

// ── Render loop ───────────────────────────────────────────
let lastAmbientTick=performance.now(), ambientItem=null, ambientStart=null, ambientRRIndex=0;
const AMBIENT_EVERY=7000, AMBIENT_DUR=450;

(function loop(){
  requestAnimationFrame(loop);
  const now=performance.now();

  if(!powerOn){
    const pulse=0.5+0.5*Math.sin(now*0.004);
    switchLedMat.emissiveIntensity=1.2+pulse*2.2;
    switchGlowLight.intensity=0.6+pulse*2.0;
  }

  for(const item of clickables.values()){
    if(item.flickerStart===null) continue;
    const elapsed=now-item.flickerStart;
    if(elapsed>=item.flickerDur){
      item.mat.emissiveIntensity=item.onInt; item.light.intensity=item.onLit; item.flickerStart=null;
    } else {
      const t=elapsed/item.flickerDur, chaos=Math.pow(1-t,0.7);
      const hz=item.flickerHz*0.001, osc=Math.sin(now*hz)*Math.sin(now*hz*2.618+1.4);
      const dip=chaos*Math.max(0,-osc);
      item.mat.emissiveIntensity=item.onInt*Math.max(0.02,1-dip);
      item.light.intensity=item.onLit*Math.max(0.1,1-dip*0.6);
    }
  }

  if(now-lastAmbientTick>=AMBIENT_EVERY){
    lastAmbientTick=now;
    const all=[...clickables.values()].filter(i=>i.on&&i.flickerStart===null&&!i.isStrip);
    if(all.length){ambientRRIndex=ambientRRIndex%all.length; ambientItem=all[ambientRRIndex]; ambientStart=now; ambientRRIndex=(ambientRRIndex+1)%all.length;}
  }
  if(ambientItem!==null){
    const elapsed=now-ambientStart;
    if(elapsed>=AMBIENT_DUR){ambientItem.mat.emissiveIntensity=ambientItem.onInt; ambientItem.light.intensity=ambientItem.onLit; ambientItem=null;}
    else{const t=elapsed/AMBIENT_DUR,env=Math.sin(t*Math.PI),osc=Math.sin(now*0.09)*0.5+0.5,dip=env*osc*0.55; ambientItem.mat.emissiveIntensity=ambientItem.onInt*(1-dip); ambientItem.light.intensity=ambientItem.onLit*(1-dip*0.5);}
  }

  const gT=now*0.001;

  { const item=clickables.get(cab1.screen);
    if(item.on){ if(item.flickerStart!==null)drawBootScreen(cab1.screenCtx,256,192); else{ drawSpaceGame(cab1.screenCtx,256,192,gT); const c=cab1.ctrl; c.js.rotation.z=_sb.dir*-0.26; if(c.fire) c.fire.position.y=c.fireBaseY-(_sb.bulletY>0?0.055:0); } cab1.screenTex.needsUpdate=true; } }

  { const item=clickables.get(cab2.screen);
    if(item.on){ if(item.flickerStart!==null)drawBootScreen(cab2.screenCtx,256,192); else{ drawFightGame(cab2.screenCtx,256,192,gT); const c=cab2.ctrl; c.js.rotation.z=_sk.p1a===1?0.25:0; c.js.rotation.x=_sk.p1a===2?-0.25:0; if(c.btns) c.btns.forEach((btn,i)=>{ const active=(i===0&&_sk.p1a===1)||(i===2&&_sk.p1a===2); btn.position.y=c.btnsBaseY[i]-(active?0.055:0); }); } cab2.screenTex.needsUpdate=true; } }

  { const item=clickables.get(cab3.screen);
    if(item.on){ if(item.flickerStart!==null)drawBootScreen(cab3.screenCtx,256,192); else{ drawRaceGame(cab3.screenCtx,256,192,gT); const c=cab3.ctrl; if(c.whl) c.whl.rotation.z=Math.sin(gT*0.9)*0.40; if(c.gas) c.gas.position.y=c.gasBaseY-0.03; } cab3.screenTex.needsUpdate=true; } }

  { const pbOn=clickables.get(pinballBack).on;
    if(pbOn){
      const dt=_pb.prevT?Math.min((now-_pb.prevT)*0.001,0.05):0.016; _pb.prevT=now;
      _pb.x+=_pb.vx*dt; _pb.z+=_pb.vz*dt;
      const BNDL=PX-0.96,BNDR=PX+0.68,BNDT=PZ-1.52,BNDB=PZ+1.50;
      if(_pb.x<BNDL){_pb.x=BNDL;_pb.vx=Math.abs(_pb.vx)+(Math.random()-0.5)*0.2;}
      if(_pb.x>BNDR){_pb.x=BNDR;_pb.vx=-Math.abs(_pb.vx)+(Math.random()-0.5)*0.2;}
      if(_pb.z<BNDT){_pb.z=BNDT;_pb.vz=Math.abs(_pb.vz)+(Math.random()-0.5)*0.2;}
      if(_pb.z>BNDB){_pb.z=BNDB;_pb.vz=-Math.abs(_pb.vz)+(Math.random()-0.5)*0.2;}
      const spd=Math.sqrt(_pb.vx*_pb.vx+_pb.vz*_pb.vz);
      if(spd>2.4){_pb.vx*=2.4/spd;_pb.vz*=2.4/spd;} if(spd<1.2){_pb.vx*=1.2/spd;_pb.vz*=1.2/spd;}
      for(const bmp of _bumpers){
        const dx=_pb.x-bmp.x,dz=_pb.z-bmp.z,dist=Math.sqrt(dx*dx+dz*dz);
        if(dist<0.36&&dist>0.001){const nx=dx/dist,nz=dz/dist,dot=_pb.vx*nx+_pb.vz*nz; _pb.vx-=2*dot*nx;_pb.vz-=2*dot*nz; const s=Math.sqrt(_pb.vx*_pb.vx+_pb.vz*_pb.vz); _pb.vx=(_pb.vx/s)*Math.max(s,1.8);_pb.vz=(_pb.vz/s)*Math.max(s,1.8);_pb.x=bmp.x+nx*0.38;_pb.z=bmp.z+nz*0.38;bmp.flash=0.35;}
        if(bmp.flash>0){bmp.flash=Math.max(0,bmp.flash-dt);bmp.mat.emissiveIntensity=bmp.baseInt+5.5*(bmp.flash/0.35);}else{bmp.mat.emissiveIntensity=bmp.baseInt;}
      }
      ballMesh.position.set(_pb.x,pfY(_pb.z)+0.10,_pb.z);
    } else {_pb.prevT=0;_pb.x=PX-0.20;_pb.z=PZ-0.50;ballMesh.position.set(PX+0.88,pfY(PZ+0.60)+0.10,PZ+0.60);for(const bmp of _bumpers)bmp.mat.emissiveIntensity=bmp.baseInt;}
  }

  renderer.render(scene,camera);
})();

// ── Resize ────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  const a=window.innerWidth/window.innerHeight;
  camera.left=-V*a; camera.right=V*a;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
